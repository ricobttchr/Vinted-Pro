                    sent: `Hi! 👋\nGood news: Your package is on its way! The tracking number (if insured) is updated in the system.\nPlease let me know when it arrives safely.\n\n${settings?.signature || ''}`
                },
                FR: {
                    fav: `Salut ! 👋\nRavi que l'article te plaise. \nN'hésite pas si tu as besoin de plus d'infos, de photos, ou si tu veux discuter du prix.\n\n${settings?.signature || ''}`,
                    low: `Salut ! 👋\nMerci pour ton offre. À ce prix, je préfère le garder pour le moment.\nMon dernier prix serait de [PREIS] €. Est-ce que ça t'irait ?\n\n${settings?.signature || ''}`,
                    bought: `Salut ! 👋\nMerci beaucoup pour ton achat !\nTon colis sera bien emballé et expédié [DATUM] au plus tard. Je te préviens dès qu'il est en route.\n\n${settings?.signature || ''}`,
                    sent: `Salut ! 👋\nBonne nouvelle : ton colis est en route ! Le numéro de suivi est dans le système.\nDis-moi quand tu l'auras bien reçu.\n\n${settings?.signature || ''}`
                },
                NL: {
                    fav: `Hoi! 👋\nLeuk dat je het artikel mooi vindt. \nLaat het me weten als je meer info of foto's nodig hebt, of als je over de prijs wilt praten.\n\n${settings?.signature || ''}`,
                    low: `Hoi! 👋\nBedankt voor je bod. Voor die prijs wil ik het momenteel nog niet wegdoen.\nMijn absolute bodemprijs is [PREIS] €. Zou dat ook goed voor je zijn?\n\n${settings?.signature || ''}`,
                    bought: `Hoi! 👋\nHeel erg bedankt voor je aankoop!\nJe pakketje gaat uiterlijk [DATUM] veilig verpakt op de post. Ik stuur je een berichtje zodra het onderweg is.\n\n${settings?.signature || ''}`,
                    sent: `Hoi! 👋\nGoed nieuws: je pakket is onderweg! Het trackingnummer staat in het systeem.\nLaat je me even weten als het goed is aangekomen?\n\n${settings?.signature || ''}`
                }
            };

            const activeLang = T[lang];
            const templates = [
                { id: 'fav', icon: 'fa-heart text-red-500', bg: 'bg-red-50', title: 'Favorit / Interesse', text: activeLang.fav },
                { id: 'low', icon: 'fa-arrow-trend-down text-orange-500', bg: 'bg-orange-50', title: 'Gegenangebot', hasPrice: true, text: activeLang.low },
                { id: 'bought', icon: 'fa-bag-shopping text-vinted-500', bg: 'bg-vinted-50', title: 'Nach dem Kauf', hasDate: true, text: activeLang.bought },
                { id: 'sent', icon: 'fa-truck-fast text-blue-500', bg: 'bg-blue-50', title: 'Paket verschickt', text: activeLang.sent },
            ];

            return (
                <div className="p-6 lg:p-12 max-w-6xl mx-auto h-full overflow-y-auto animate-fade-in no-scrollbar pb-32">
                    <div className="mb-10 flex flex-col md:flex-row md:items-end justify-between gap-6">
                        <div>
                            <h1 className="text-4xl font-extrabold text-gray-900 tracking-tight">Smart Reply</h1>
                            <p className="text-gray-500 mt-1 font-medium text-lg">Instant Antworten in 4 Sprachen. Null Wartezeit.</p>
                        </div>
                        <Card noPadding className="flex flex-col sm:flex-row divide-y sm:divide-y-0 sm:divide-x divide-gray-100 shadow-sm border border-gray-200">
                            <div className="px-5 py-4 flex items-center gap-3 bg-white">
                                <i className="fa-solid fa-euro-sign text-gray-400 text-sm"></i>
                                <input type="number" placeholder="Preis (z.B. 15)" value={price} onChange={e=>setPrice(e.target.value)} className="outline-none font-bold text-sm w-20 text-gray-900 placeholder-gray-300" />
                            </div>
                            <div className="px-5 py-4 flex items-center gap-3 bg-white">
                                <i className="fa-regular fa-calendar text-gray-400 text-sm"></i>
                                <input type="text" placeholder="Tag (z.B. morgen)" value={date} onChange={e=>setDate(e.target.value)} className="outline-none font-bold text-sm w-28 text-gray-900 placeholder-gray-300" />
                            </div>
                            <div className="px-5 py-4 flex items-center gap-3 bg-gray-50 cursor-pointer relative hover:bg-gray-100 transition-colors">
                                <i className="fa-solid fa-globe text-vinted-500 text-sm"></i>
                                <select value={lang} onChange={e=>setLang(e.target.value)} className="appearance-none outline-none font-extrabold text-sm text-gray-900 cursor-pointer bg-transparent pr-4 w-28">
                                    <option value="DE">Deutsch</option><option value="EN">English</option><option value="FR">Français</option><option value="NL">Nederlands</option>
                                </select>
                                <i className="fa-solid fa-chevron-down absolute right-4 top-1/2 -translate-y-1/2 text-[10px] text-gray-400 pointer-events-none"></i>
                            </div>
                        </Card>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        {templates.map((tpl, i) => {
                            let text = tpl.text;
                            if(tpl.hasPrice) text = text.replace('[PREIS]', price || 'XX');
                            if(tpl.hasDate) text = text.replace('[DATUM]', date || 'schnellstmöglich');
                            return (
                                <Card key={tpl.id} noPadding className="flex flex-col border border-gray-200 group hover:shadow-card-hover transition-all duration-300 hover:-translate-y-1 animate-slide-up" style={{animationDelay: `${i*100}ms`}}>
                                    <div className="p-5 border-b border-gray-100 flex items-center gap-4 bg-white">
                                        <div className={`w-12 h-12 rounded-xl flex items-center justify-center shrink-0 shadow-inner-light border border-white ${tpl.bg}`}><i className={`fa-solid ${tpl.icon} text-xl`}></i></div>
                                        <h3 className="font-extrabold text-gray-900 text-lg">{tpl.title}</h3>
                                    </div>
                                    <div className="p-8 flex-1 bg-gray-50/50"><p className="whitespace-pre-wrap text-base text-gray-700 font-medium leading-relaxed">{text}</p></div>
                                    <div className="p-5 border-t border-gray-100 bg-white">
                                        <Button variant="secondary" onClick={() => {navigator.clipboard.writeText(text); addToast("Kopiert!");}} className="w-full shadow-none group-hover:bg-gray-900 group-hover:text-white transition-colors border-transparent group-hover:border-gray-900" size="lg" icon="fa-copy">Text Kopieren</Button>
                                    </div>
                                </Card>
                            )
                        })}
                    </div>
                </div>
            );
        };

        // --- SETTINGS (Mit Export / Import) ---
        const Settings = () => {
            const { settings, actions, addToast } = useAppContext();
            const [localData, setLocalData] = useState(settings || {});

            const save = () => { actions.updateSettings(localData); addToast("Einstellungen gespeichert"); };
            const triggerFileSelect = () => document.getElementById('importFile').click();

            const handleImport = (e) => {
                const file = e.target.files[0];
                if(!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const parsed = JSON.parse(e.target.result);
                        actions.importData(parsed);
                    } catch(err) {
                        addToast("Die Datei ist beschädigt oder ungültig.", "error");
                    }
                };
                reader.readAsText(file);
            };

            return (
                <div className="p-6 lg:p-12 max-w-4xl mx-auto h-full overflow-y-auto animate-fade-in pb-32">
                    <div className="mb-10 animate-slide-in-right">
                        <h1 className="text-4xl font-extrabold text-gray-900 tracking-tight">Einstellungen</h1>
                        <p className="text-gray-500 mt-2 font-medium text-lg">Personalisiere und sichere dein VintedPro System.</p>
                    </div>

                    <div className="space-y-8 animate-slide-up" style={{animationDelay: '100ms'}}>
                        
                        <Card className="p-8 md:p-10 border-t-4 border-t-vinted-500 shadow-sm">
                            <h2 className="text-xl font-bold text-gray-900 mb-6 border-b border-gray-100 pb-4"><i className="fa-solid fa-hard-drive text-vinted-500 mr-2"></i> Data Management (Backup)</h2>
                            <p className="text-sm text-gray-500 mb-8 font-medium leading-relaxed">Da VintedPro alle Daten lokal in deinem Browser speichert, solltest du regelmäßig ein Backup erstellen. So kannst du deine Daten auf einen anderen PC übertragen oder vor Datenverlust schützen.</p>
                            
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div className="bg-gray-50 p-6 rounded-2xl border border-gray-200 shadow-inner-light">
                                    <h3 className="font-bold text-gray-900 mb-2">Daten Exportieren</h3>
                                    <p className="text-xs text-gray-500 mb-4">Lade Inventar, Snipes und Routen als .json herunter.</p>
                                    <Button onClick={actions.exportData} variant="primary" className="w-full" icon="fa-cloud-arrow-down">Backup erstellen</Button>
                                </div>
                                <div className="bg-gray-50 p-6 rounded-2xl border border-gray-200 shadow-inner-light">
                                    <h3 className="font-bold text-gray-900 mb-2">Daten Importieren</h3>
                                    <p className="text-xs text-gray-500 mb-4">Stelle das System aus einer alten .json Datei wieder her.</p>
                                    <input type="file" id="importFile" accept=".json" className="hidden" onChange={handleImport} />
                                    <Button onClick={triggerFileSelect} variant="secondary" className="w-full" icon="fa-cloud-arrow-up">Backup laden</Button>
                                </div>
                            </div>
                        </Card>

                        <Card className="p-8 md:p-10">
                            <h2 className="text-xl font-bold text-gray-900 mb-8 border-b border-gray-100 pb-4"><i className="fa-solid fa-user text-vinted-500 mr-2"></i> Profil & Texte</h2>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                <Input label="Dein Vorname" value={localData.userName || ''} onChange={e=>setLocalData({...localData, userName: e.target.value})} icon="fa-user" />
                                <Input label="Nachrichten-Signatur" value={localData.signature || ''} onChange={e=>setLocalData({...localData, signature: e.target.value})} icon="fa-pen-nib" />
                            </div>
                        </Card>
                        
                        <Card className="p-8 md:p-10">
                            <h2 className="text-xl font-bold text-gray-900 mb-8 border-b border-gray-100 pb-4"><i className="fa-solid fa-microchip text-vinted-500 mr-2"></i> System (API)</h2>
                            <div className="mb-6">
                                <Input label="Google Gemini API Key" type="password" value={API_KEY} readOnly icon="fa-key" className="opacity-70 pointer-events-none" disabled />
                            </div>
                            <Select label="KI Modell (Priorität)" value={localData.apiModel || 'gemini-1.5-flash'} onChange={e=>setLocalData({...localData, apiModel: e.target.value})} options={['gemini-1.5-flash', 'gemini-flash-latest', 'gemini-1.5-pro']} icon="fa-server" />
                            <div className="bg-blue-50/80 p-5 rounded-2xl border border-blue-100 flex gap-4 items-start mt-6 shadow-sm">
                                <i className="fa-solid fa-shield-halved text-blue-600 mt-0.5 text-lg"></i>
                                <p className="text-sm text-blue-900 leading-relaxed font-medium">Dein System testet automatisch Fallback-Modelle mit Exponential Backoff (Schutz vor API-Limits und Abstürzen).</p>
                            </div>
                        </Card>

                        <div className="flex justify-end pt-4">
                            <Button onClick={save} icon="fa-save" size="lg" className="px-10 shadow-lg">Einstellungen speichern</Button>
                        </div>
                    </div>
                </div>
            );
        };

        // ==========================================
        // 5. MAIN APP LAYOUT (LÜCKENLOS!)
        // ==========================================
        const MainApp = () => {
            const [view, setView] = useState('analyze'); 
            const [isSidebarOpen, setSidebarOpen] = useState(false);
            const { settings } = useAppContext();

            // Sichert ab, dass die App bei undefiniertem View nicht crasht
            const menu = {
                dashboard: { icon: 'fa-grip', label: 'Dashboard', component: <Dashboard setView={setView} /> },
                analyze: { icon: 'fa-wand-magic-sparkles', label: 'Analyse Studio', component: <AnalyzeStudio /> },
                history: { icon: 'fa-box-archive', label: 'Inventar', component: <Inventory setView={setView} /> },
                dealchecker: { icon: 'fa-scale-balanced', label: 'Deal Checker Pro', component: <DealChecker /> },
                sniper: { icon: 'fa-crosshairs', label: 'Sniper & Trends', component: <Sniper /> },
                smartreply: { icon: 'fa-comment-dots', label: 'Smart Reply', component: <SmartReply /> },
                shipping: { icon: 'fa-route', label: 'Routenplaner', component: <ShippingRoutePlanner /> },
                profit: { icon: 'fa-chart-pie', label: 'Profit Tracker', component: <ProfitTracker /> },
                settings: { icon: 'fa-gear', label: 'Einstellungen', component: <Settings /> },
            };

            const activeComponent = menu[view]?.component || <div className="p-10 text-center"><i className="fa-solid fa-circle-notch fa-spin text-3xl"></i><p className="mt-4 font-bold">Lade Modul...</p></div>;

            return (
                <div className="flex h-screen w-full overflow-hidden bg-transparent relative z-10">
                    <div className={`fixed inset-0 bg-gray-900/40 backdrop-blur-sm z-40 transition-opacity lg:hidden ${isSidebarOpen ? 'opacity-100' : 'opacity-0 pointer-events-none'}`} onClick={() => setSidebarOpen(false)}></div>
                    
                    <aside className={`fixed lg:relative w-[280px] bg-white/80 backdrop-blur-xl border-r border-white/50 h-full flex flex-col z-50 transition-transform ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full lg:translate-x-0'}`}>
                        <div className="h-24 flex items-center px-8 border-b border-gray-200/50 shrink-0">
                            <div className="w-10 h-10 bg-gray-900 rounded-xl flex items-center justify-center text-white mr-4"><i className="fa-solid fa-shirt"></i></div>
                            <span className="text-2xl font-extrabold">Vinted<span className="text-vinted-600">Pro</span></span>
                        </div>
                        
                        <nav className="flex-1 py-8 px-4 space-y-1.5 overflow-y-auto no-scrollbar">
                            <div className="px-4 mb-3 text-[10px] font-extrabold text-gray-400 uppercase tracking-widest">Tools</div>
                            {Object.entries(menu).map(([id, item]) => (
                                <button key={id} onClick={() => { setView(id); setSidebarOpen(false); }} className={`w-full flex items-center gap-4 px-4 py-3 rounded-2xl transition-all font-bold text-sm ${view === id ? 'bg-white text-vinted-600 shadow-sm border border-gray-100' : 'text-gray-500 hover:bg-white/50'}`}>
                                    <i className={`fa-solid ${item.icon} w-6`}></i>{item.label}
                                </button>
                            ))}
                        </nav>

                        {/* Vinted Direct Link Global */}
                        <div className="px-4 pb-4">
                            <button onClick={()=>window.open('https://www.vinted.de', '_blank')} className="w-full flex items-center justify-center gap-2 bg-vinted-50 hover:bg-vinted-100 text-vinted-700 py-3 rounded-2xl font-bold text-sm transition-colors border border-vinted-200">
                                <i className="fa-solid fa-arrow-up-right-from-square"></i> Vinted.de öffnen
                            </button>
                        </div>

                        <div className="p-6 border-t border-gray-200/50">
                            <div className="flex items-center gap-4 bg-white/60 p-3 rounded-2xl border border-white shadow-sm cursor-pointer hover:bg-white transition-colors" onClick={()=>setView('settings')}>
                                <img src={`https://ui-avatars.com/api/?name=${settings?.userName || 'Rico'}&background=f3e8ff&color=9333ea&bold=true`} className="w-10 h-10 rounded-xl" />
                                <div className="flex-1 min-w-0">
                                    <p className="text-sm font-extrabold truncate">{settings?.userName || 'Rico'}</p>
                                    <p className="text-[10px] font-bold text-green-500"><i className="fa-solid fa-circle animate-pulse"></i> Pro</p>
                                </div>
                            </div>
                        </div>
                    </aside>

                    <main className="flex-1 flex flex-col min-w-0 h-full relative z-0">
                        <header className="h-16 bg-white/80 backdrop-blur-md border-b border-gray-200/50 flex items-center px-4 shrink-0 lg:hidden z-20">
                            <button onClick={() => setSidebarOpen(true)} className="w-10 h-10 flex items-center justify-center rounded-xl hover:bg-gray-100"><i className="fa-solid fa-bars text-lg"></i></button>
                            <span className="font-bold ml-2">{menu[view]?.label}</span>
                            <div className="w-10"></div>
                        </header>
                        <div className="flex-1 relative z-10 overflow-hidden">
                            {activeComponent}
                        </div>
                    </main>
                </div>
            );
        };

        const RootApp = () => <ErrorBoundary><AppProvider><MainApp /></AppProvider></ErrorBoundary>;
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<RootApp />);
    </script>
</body>
</html>
