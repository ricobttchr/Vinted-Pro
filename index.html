<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VintedPro - Ultimate Seller OS</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { vinted: { 50: '#faf5ff', 100: '#f3e8ff', 200: '#e9d5ff', 300: '#d8b4fe', 400: '#c084fc', 500: '#a855f7', 600: '#9333ea', 700: '#7e22ce', 800: '#6b21a8', 900: '#581c87' } },
                    boxShadow: { 'card': '0 8px 30px rgba(0, 0, 0, 0.04), 0 4px 10px rgba(0, 0, 0, 0.02)', 'inner-light': 'inset 0 2px 4px 0 rgba(0, 0, 0, 0.02)', 'floating': '0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04)' },
                    animation: { 'fade-in': 'fadeIn 0.5s ease-out forwards', 'slide-up': 'slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards', 'slide-in-right': 'slideInRight 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards' },
                    keyframes: { fadeIn: { '0%': { opacity: 0 }, '100%': { opacity: 1 } }, slideUp: { '0%': { opacity: 0, transform: 'translateY(20px)' }, '100%': { opacity: 1, transform: 'translateY(0)' } }, slideInRight: { '0%': { opacity: 0, transform: 'translateX(30px)' }, '100%': { opacity: 1, transform: 'translateX(0)' } } }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f4f5f7; color: #111827; overflow: hidden; -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        *:focus-visible { outline: none; box-shadow: 0 0 0 2px #ffffff, 0 0 0 4px #d8b4fe; }
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 20px; width: 20px; border-radius: 50%; background: #9333ea; cursor: pointer; margin-top: -8px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 6px; cursor: pointer; background: #e5e7eb; border-radius: 4px; }
        .glass-effect { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.5); }
    </style>
</head>
<body class="h-screen w-screen font-sans text-gray-900 selection:bg-vinted-200 selection:text-vinted-900 relative">
    <div id="root" class="h-full w-full relative z-10"></div>
    <script type="text/babel">
        const { useState, useEffect, createContext, useContext, Component } = React;

        const parsePrice = (val) => {
            if (val === undefined || val === null || val === '') return 0;
            if (typeof val === 'number') return isNaN(val) ? 0 : val;
            const cleaned = String(val).replace(/[^\d.,-]/g, '').replace(',', '.');
            const num = parseFloat(cleaned);
            return isNaN(num) ? 0 : num;
        };

        class ErrorBoundary extends Component {
            constructor(props) { super(props); this.state = { hasError: false, error: null }; }
            static getDerivedStateFromError(error) { return { hasError: true, error }; }
            render() {
                if (this.state.hasError) return (
                    <div className="min-h-screen flex flex-col items-center justify-center bg-gray-50 p-8 text-center z-50">
                        <i className="fa-solid fa-shield-cat text-6xl text-red-500 mb-6"></i>
                        <h1 className="text-3xl font-bold mb-2">System Error Guard</h1>
                        <p className="mb-6 max-w-lg">Crash abgefangen. Bitte Cache leeren.</p>
                        <button onClick={() => { localStorage.clear(); window.location.reload(); }} className="bg-gray-900 text-white font-bold py-4 px-8 rounded-2xl"><i className="fa-solid fa-rotate-right mr-2"></i> Cache leeren & Neustart</button>
                    </div>
                );
                return this.props.children; 
            }
        }

        const API_KEY = "AIzaSyBIcM5Tr0Z0FNTLObfQnJGmoY0JkqGblew";
        const VINTED_DATA = {
            categories: ["Damenbekleidung", "Herrenbekleidung", "Sneaker & Schuhe", "Vintage & Y2K", "Taschen & Accessoires", "Kinder & Baby", "Home & Deko", "Elektronik", "Sonstiges"],
            conditions: ["Neu mit Etikett", "Neu ohne Etikett", "Sehr gut", "Gut", "Zufriedenstellend"],
            colors: ["Schwarz", "Weiß", "Grau", "Blau", "Rot", "Grün", "Gelb", "Braun", "Beige", "Lila", "Pink", "Gold", "Silber", "Mehrfarbig"],
            materials: ["Nicht angegeben", "100% Baumwolle", "Polyester", "Leder", "Kunstleder", "Seide", "Leinen", "Wolle", "Denim", "Mischgewebe"],
            carriers: ["DHL", "Hermes", "GLS", "DPD", "PostAT"]
        };

        const fileToBase64 = (file) => new Promise((res, rej) => { const r = new FileReader(); r.readAsDataURL(file); r.onload = () => res({ mimeType: file.type, data: r.result.split(',')[1] }); r.onerror = rej; });

        const callGemini = async (prompt, images = [], customModel = "gemini-1.5-flash") => {
            const modelsToTry = [customModel || 'gemini-1.5-flash', 'gemini-flash-latest', 'gemini-1.5-pro'];
            let lastError = null;
            for (const model of modelsToTry) {
                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${API_KEY}`, {
                        method: "POST", headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }, ...images.map(img => ({ inlineData: { mimeType: img.mimeType, data: img.data } }))] }], generationConfig: { responseMimeType: "application/json" } })
                    });
                    if (!res.ok) { if (res.status === 429) { await new Promise(r => setTimeout(r, 2000)); continue; } throw new Error(`HTTP ${res.status}`); }
                    const data = await res.json();
                    let text = data.candidates[0].content.parts[0].text;
                    const match = text.match(/\{[\s\S]*\}/);
                    return JSON.parse(match ? match[0] : text);
                } catch (e) { lastError = e; }
            }
            throw new Error(`KI-Server überlastet. ${lastError?.message}`);
        };

        const AppContext = createContext(null);
        const AppProvider = ({ children }) => {
            const [toasts, setToasts] = useState([]);
            const useStickyState = (def, key) => {
                const [val, setVal] = useState(() => {
                    try {
                        const s = window.localStorage.getItem(key);
                        if (s) { const p = JSON.parse(s); if(Array.isArray(def)) return Array.isArray(p)?p.filter(Boolean):def; return typeof p==='object'&&p!==null?{...def,...p}:p; }
                    } catch (e) { window.localStorage.removeItem(key); }
                    return def;
                });
                useEffect(() => { try { window.localStorage.setItem(key, JSON.stringify(val)); } catch(e){} }, [key, val]);
                return [val, setVal];
            };

            const [listings, setListings] = useStickyState([], 'vpro_listings_v17');
            const [alerts, setAlerts] = useStickyState([], 'vpro_alerts_v17');
            const [routeStops, setRouteStops] = useStickyState([], 'vpro_routes_v17');
            const [settings, setSettings] = useStickyState({ userName: 'Rico', signature: 'LG Rico 😁', apiModel: 'gemini-1.5-flash' }, 'vpro_settings_v17');

            const addToast = (msg, type = 'success') => { const id = Date.now(); setToasts(p => [...p, { id, msg, type }]); setTimeout(() => setToasts(p => p.filter(t => t.id !== id)), 4000); };
            const actions = {
                addListing: (l) => setListings(p => [l, ...(Array.isArray(p)?p.filter(Boolean):[])]),
                updateListing: (id, u) => setListings(p => (Array.isArray(p)?p.filter(Boolean):[]).map(l => l?.id === id ? { ...l, ...u } : l)),
                deleteListing: (id) => setListings(p => (Array.isArray(p)?p.filter(Boolean):[]).filter(l => l?.id !== id)),
                addAlert: (a) => setAlerts(p => [{...a, id: Date.now()}, ...(Array.isArray(p)?p.filter(Boolean):[])]),
                deleteAlert: (id) => setAlerts(p => (Array.isArray(p)?p.filter(Boolean):[]).filter(a => a?.id !== id)),
                addRouteStop: (carrier) => setRouteStops(p => [...(Array.isArray(p)?p.filter(Boolean):[]), { id: Date.now(), carrier, notes: '' }]),
                updateRouteStop: (id, notes) => setRouteStops(p => (Array.isArray(p)?p.filter(Boolean):[]).map(s => s?.id === id ? {...s, notes} : s)),
                deleteRouteStop: (id) => setRouteStops(p => (Array.isArray(p)?p.filter(Boolean):[]).filter(s => s?.id !== id)),
                clearRoute: () => setRouteStops([]),
                updateSettings: (u) => setSettings(p => ({...(p||{}), ...u})),
                exportData: () => { try { const blob = new Blob([JSON.stringify({ listings: listings.filter(Boolean), alerts: alerts.filter(Boolean), routeStops: routeStops.filter(Boolean), settings }, null, 2)], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `VintedPro_Backup.json`; a.click(); addToast("Export erfolgreich!"); } catch(e){ addToast("Fehler", "error"); } },
                importData: (jd) => { try { if(jd.listings) setListings(jd.listings.filter(Boolean)); if(jd.alerts) setAlerts(jd.alerts.filter(Boolean)); if(jd.routeStops) setRouteStops(jd.routeStops.filter(Boolean)); if(jd.settings) setSettings(p => ({...p, ...jd.settings})); addToast("Importiert! Lade neu..."); setTimeout(() => window.location.reload(), 1500); } catch(e) { addToast("Fehlerhafte Datei", "error"); } }
            };

            return (
                <AppContext.Provider value={{ listings: Array.isArray(listings)?listings.filter(Boolean):[], alerts: Array.isArray(alerts)?alerts.filter(Boolean):[], routeStops: Array.isArray(routeStops)?routeStops.filter(Boolean):[], settings: settings||{}, actions, addToast }}>
                    {children}
                    <div className="fixed bottom-6 right-6 z-[999] flex flex-col gap-3 pointer-events-none">
                        {toasts.map(t => (
                            <div key={t.id} className="animate-slide-up glass-effect bg-white/95 px-5 py-4 rounded-2xl shadow-floating flex items-center gap-4 pointer-events-auto border-l-4 w-80" style={{borderLeftColor: t.type === 'error' ? '#ef4444' : t.type === 'warning' ? '#f59e0b' : '#10b981'}}>
                                <div className={`w-8 h-8 rounded-full flex items-center justify-center shrink-0 ${t.type === 'error' ? 'bg-red-100 text-red-500' : 'bg-green-100 text-green-500'}`}><i className={`fa-solid ${t.type === 'error' ? 'fa-xmark' : 'fa-check'}`}></i></div>
                                <p className="font-bold text-sm">{t.msg}</p>
                            </div>
                        ))}
                    </div>
                </AppContext.Provider>
            );
        };
        const useAppContext = () => useContext(AppContext);

        const Card = ({ children, className = "", noPadding = false, onClick }) => <div onClick={onClick} className={`bg-white rounded-3xl shadow-card border border-gray-100 overflow-hidden ${onClick ? 'cursor-pointer hover:-translate-y-1 transition-transform' : ''} ${noPadding ? '' : 'p-6 md:p-8'} ${className}`}>{children}</div>;
        const Button = ({ children, onClick, variant = 'primary', icon, loading = false, className = "", disabled = false, size="md" }) => {
            const v = { primary: "bg-gray-900 hover:bg-black text-white", vinted: "bg-vinted-600 hover:bg-vinted-700 text-white", secondary: "bg-white hover:bg-gray-50 text-gray-700 border border-gray-200", ghost: "bg-transparent hover:bg-gray-100 text-gray-600" };
            const s = { sm: "py-2 px-4 text-xs rounded-xl", md: "py-3 px-6 text-sm rounded-2xl", lg: "py-4 px-8 text-base rounded-2xl" };
            return <button onClick={onClick} disabled={disabled || loading} className={`relative flex items-center justify-center font-bold transition-all active:scale-95 disabled:opacity-60 shadow-sm ${v[variant]} ${s[size]} ${className}`}>{loading ? <i className="fa-solid fa-circle-notch fa-spin"></i> : <span className="flex items-center gap-2">{icon && <i className={`fa-solid ${icon}`}></i>} <span>{children}</span></span>}</button>;
        };
        const Input = ({ label, type="text", value, onChange, placeholder, icon, multiline=false, rows=4, className="", disabled=false, list }) => (
            <div className={`flex flex-col gap-1.5 ${className}`}>
                {label && <label className="text-[11px] font-extrabold text-gray-500 uppercase tracking-widest pl-1">{label}</label>}
                <div className="relative group">
                    {icon && <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400"><i className={`fa-solid ${icon}`}></i></div>}
                    {multiline ? <textarea rows={rows} value={value} onChange={onChange} disabled={disabled} placeholder={placeholder} className={`block w-full rounded-2xl border border-gray-200 bg-gray-50/50 p-3.5 sm:text-sm resize-none outline-none focus:bg-white focus:border-vinted-500 ${icon?'pl-11':''}`}></textarea> : <input type={type} value={value} onChange={onChange} disabled={disabled} placeholder={placeholder} list={list} className={`block w-full rounded-2xl border border-gray-200 bg-gray-50/50 p-3.5 sm:text-sm outline-none focus:bg-white focus:border-vinted-500 ${icon?'pl-11':''}`} />}
                </div>
            </div>
        );
        const Select = ({ label, value, onChange, options, icon }) => (
            <div className="flex flex-col gap-1.5">
                {label && <label className="text-[11px] font-extrabold text-gray-500 uppercase tracking-widest pl-1">{label}</label>}
                <div className="relative">
                    {icon && <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400"><i className={`fa-solid ${icon}`}></i></div>}
                    <select value={value} onChange={onChange} className={`appearance-none block w-full rounded-2xl border border-gray-200 bg-gray-50/50 font-semibold p-3.5 pr-10 sm:text-sm outline-none focus:bg-white focus:border-vinted-500 ${icon?'pl-11':''}`}>{options.map(o => <option key={o} value={o}>{o}</option>)}</select>
                    <div className="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none text-gray-400"><i className="fa-solid fa-chevron-down text-xs"></i></div>
                </div>
            </div>
        );
        const Badge = ({ children, color = 'gray', className = "" }) => {
            const c = { gray: "bg-gray-100 text-gray-700", green: "bg-green-50 text-green-700", vinted: "bg-vinted-50 text-vinted-700", amber: "bg-amber-50 text-amber-700", red: "bg-red-50 text-red-700", blue: "bg-blue-50 text-blue-700" };
            return <span className={`inline-flex items-center px-2.5 py-0.5 rounded-lg text-xs font-bold border border-black/5 ${c[color]} ${className}`}>{children}</span>;
        };

        // --- DASHBOARD ---
        const Dashboard = ({ setView }) => {
            const { listings, settings } = useAppContext();
            const active = listings.filter(l => l?.status === 'active');
            const sold = listings.filter(l => l?.status === 'sold');
            const revenue = sold.reduce((acc, curr) => acc + parsePrice(curr?.price), 0);
            const conversionRate = listings.length ? Math.round((sold.length / listings.length) * 100) : 0;
            const recent = [...listings].filter(l => l?.title).sort((a,b) => new Date(b?.date || 0) - new Date(a?.date || 0)).slice(0, 4);

            return (
                <div className="p-6 lg:p-12 max-w-[1600px] mx-auto h-full overflow-y-auto animate-fade-in no-scrollbar pb-32">
                    <div className="mb-10 flex flex-col md:flex-row md:items-end justify-between gap-4">
                        <div><h1 className="text-4xl md:text-5xl font-extrabold text-gray-900 tracking-tight">Übersicht</h1><p className="text-gray-500 mt-2 font-medium">Willkommen, {settings?.userName || 'Rico'}.</p></div>
                        <Button variant="vinted" onClick={()=>setView('analyze')} icon="fa-plus" size="lg">Neues Inserat</Button>
                    </div>
                    <div className="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-6 mb-12">
                        <Card className="flex flex-col justify-between p-6"><div className="w-12 h-12 rounded-2xl bg-blue-50 text-blue-600 flex items-center justify-center mb-4"><i className="fa-solid fa-boxes-stacked text-xl"></i></div><p className="text-sm font-bold text-gray-500">Aktiv im Store</p><h3 className="text-3xl font-black">{active.length}</h3></Card>
                        <Card className="flex flex-col justify-between p-6"><div className="w-12 h-12 rounded-2xl bg-green-50 text-green-600 flex items-center justify-center mb-4"><i className="fa-solid fa-handshake text-xl"></i></div><p className="text-sm font-bold text-gray-500">Verkauft</p><h3 className="text-3xl font-black">{sold.length}</h3></Card>
                        <Card className="flex flex-col justify-between p-6"><div className="w-12 h-12 rounded-2xl bg-amber-50 text-amber-600 flex items-center justify-center mb-4"><i className="fa-solid fa-box-archive text-xl"></i></div><p className="text-sm font-bold text-gray-500">Inventar gesamt</p><h3 className="text-3xl font-black">{listings.length}</h3></Card>
                        <Card className="flex flex-col justify-between bg-gray-900 text-white p-6"><div className="w-12 h-12 rounded-2xl bg-gray-800 text-white border border-gray-700 flex items-center justify-center mb-4"><i className="fa-solid fa-sack-dollar text-xl"></i></div><p className="text-sm font-bold text-gray-400">Gesamtumsatz</p><h3 className="text-3xl font-black">{revenue.toFixed(2)} €</h3></Card>
                    </div>
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                        <Card className="flex flex-col p-8">
                            <div className="flex justify-between items-center mb-6"><h3 className="text-xl font-extrabold text-gray-900">Letzte Aktivitäten</h3><Button variant="ghost" onClick={()=>setView('history')}>Alle ansehen</Button></div>
                            <div className="space-y-4">
                                {recent.map((item, i) => (
                                    <div key={item.id||i} className="flex items-center gap-4 bg-gray-50/50 p-4 rounded-2xl border border-gray-100">
                                        <div className={`w-12 h-12 rounded-xl flex items-center justify-center shrink-0 ${item.status === 'sold' ? 'bg-green-100 text-green-600' : 'bg-vinted-100 text-vinted-600'}`}><i className={`fa-solid ${item.status === 'sold' ? 'fa-check' : 'fa-sparkles'}`}></i></div>
                                        <div className="flex-1 min-w-0"><p className="font-bold text-gray-900 truncate">{item.title}</p><p className="text-xs font-bold text-gray-500">{item.status === 'sold' ? 'Verkauft' : 'Gelistet'}</p></div>
                                        <p className="font-black text-gray-900">{parsePrice(item.price).toFixed(2)} €</p>
                                    </div>
                                ))}
                                {recent.length===0 && <p className="text-center text-gray-400 py-10">Keine Einträge.</p>}
                            </div>
                        </Card>
                        <div className="space-y-8">
                            <Card className="p-8 bg-vinted-50/80 border-vinted-200"><h3 className="text-xl font-extrabold text-vinted-900 mb-3"><i className="fa-solid fa-graduation-cap text-vinted-600 mr-2"></i> Seller Insight</h3><p className="text-sm text-vinted-800 font-medium">Lade alle Entwürfe gebündelt am **Sonntag zwischen 19 und 21 Uhr** hoch für maximale Sichtbarkeit!</p></Card>
                            <Card className="p-8"><h3 className="text-xl font-extrabold text-gray-900 mb-6">Quick Tools</h3>
                                <div className="grid grid-cols-2 gap-4">
                                    <button onClick={()=>setView('sniper')} className="p-6 rounded-2xl bg-white hover:shadow-md border border-gray-200 text-left"><i className="fa-solid fa-crosshairs text-red-500 mb-2 text-xl"></i><p className="font-bold text-gray-900">Snipe Radar</p></button>
                                    <button onClick={()=>setView('shipping')} className="p-6 rounded-2xl bg-white hover:shadow-md border border-gray-200 text-left"><i className="fa-solid fa-route text-blue-500 mb-2 text-xl"></i><p className="font-bold text-gray-900">Routenplaner</p></button>
                                </div>
                            </Card>
                        </div>
                    </div>
                </div>
            );
        };

        // --- ANALYZE STUDIO ---
        const AnalyzeStudio = () => {
            const { actions, addToast, settings } = useAppContext();
            const [step, setStep] = useState(1);
            const [files, setFiles] = useState([]);
            const [loading, setLoading] = useState(false);
            const [result, setResult] = useState(null);
            
            const [data, setData] = useState({ category: VINTED_DATA.categories[0], condition: VINTED_DATA.conditions[2], color: VINTED_DATA.colors[0], material: VINTED_DATA.materials[0], brand: "", style: "Detailliert", pricingStrategy: "Pessimistisch", deepAnalysis: false });

            const handleDrop = (e) => { e.preventDefault(); const dropped = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/')); if(dropped.length) setFiles(p => [...p, ...dropped]); };

            const runAnalysis = async () => {
                setLoading(true); setStep(3);
                try {
                    const b64s = []; for(let f of files) b64s.push(await fileToBase64(f));
                    const styleInstruction = data.style === 'Detailliert' ? `Locker, ausführlich. Starte mit "Moin! 👋". Beschreibe Zustand, Material, Farbe. Beende mit: "${settings?.signature || ''}" und Privatverkauf-Hinweis.` : `Extrem kurz, Stichpunkt-Stil. Harte Fakten. Keine Begrüßung.`;
                    const priceInstruction = data.pricingStrategy === 'Pessimistisch' ? `Rechne sehr pessimistisch (Quick Flip). Setze Preis an untere Marktgrenze.` : `Rechne optimistisch auf maximalen Profit mit Verhandlungsspielraum.`;
                    const deepJson = data.deepAnalysis ? `"detailed_price_breakdown": { "lowest": 15, "highest": 40, "avg_time": "1-2 Wochen", "factors": ["Faktor"], "deep_analysis": "Sehr ausführliche Marktanalyse..." }` : `"detailed_price_breakdown": null`;

                    const prompt = `Vinted Experte. Analysiere Angebot: Kat: ${data.category}, Zust: ${data.condition}, Marke: ${data.brand||'-'}, Farbe: ${data.color}, Mat: ${data.material}.
                    Copy: ${styleInstruction}. Pricing: ${priceInstruction}.
                    GIB NUR DIESES JSON ZURÜCK: { "title": "SEO-Titel max 60Z", "description": "Text exakt nach Stil", "suggested_price": 25, "price_rationale": "Kurze Begründung", ${deepJson}, "image_score": "8/10", "image_tips": "Kritische Tipps zu Fotos", "selling_tips": "Kategorie-Tipp", "hashtags": "#tags" }`;

                    const parsed = await callGemini(prompt, b64s, settings?.apiModel);
                    setResult(parsed);
                    
                    actions.addListing({ id: Date.now().toString(), title: parsed.title, description: parsed.description, price: parsePrice(parsed.suggested_price), buy_price: 0, status: 'active', shipping_status: 'pack', date: new Date().toISOString(), category: data.category, condition: data.condition, brand: data.brand });
                    addToast("Gespeichert!", "success"); setStep(4);
                } catch (e) { addToast(e.message, "error"); setStep(2); } finally { setLoading(false); }
            };

            return (
                <div className="p-6 lg:p-12 max-w-5xl mx-auto h-full overflow-y-auto animate-fade-in no-scrollbar pb-32">
                    <div className="text-center mb-10"><h1 className="text-4xl font-extrabold text-gray-900">AI Listing Studio</h1></div>
                    
                    <div className="max-w-2xl mx-auto mb-12 relative flex items-center justify-between">
                        <div className="absolute w-full h-1 bg-gray-200 z-0"></div><div className="absolute h-1 bg-vinted-500 transition-all duration-700 z-0" style={{width: `${((step-1)/3)*100}%`}}></div>
                        {[1,2,3,4].map(num => <div key={num} className={`w-10 h-10 rounded-full border-4 flex items-center justify-center font-bold z-10 bg-white ${step >= num ? 'border-vinted-500 text-vinted-600' : 'border-gray-200 text-gray-400'}`}>{step > num ? <i className="fa-solid fa-check"></i> : num}</div>)}
                    </div>

                    <div className="max-w-3xl mx-auto">
                        {step === 1 && (
                            <Card className="p-8 md:p-14 text-center">
                                <div className="w-24 h-24 bg-white border border-gray-100 shadow-sm rounded-full flex items-center justify-center text-vinted-600 text-4xl mx-auto mb-6"><i className="fa-solid fa-camera"></i></div>
                                <h2 className="text-3xl font-extrabold mb-8">Artikelfotos</h2>
                                <div onDragOver={e=>e.preventDefault()} onDrop={handleDrop} className="border-2 border-dashed border-gray-300 rounded-3xl bg-white hover:bg-gray-50 transition-all p-12 cursor-pointer relative">
                                    <input type="file" multiple accept="image/*" onChange={(e) => setFiles(p => [...p, ...Array.from(e.target.files)])} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" />
                                    <i className="fa-solid fa-cloud-arrow-up text-5xl text-gray-300 mb-4"></i><h3 className="font-bold text-gray-900 text-lg">Dateien auswählen oder ablegen</h3>
                                </div>
                                {files.length > 0 && <div className="mt-6 flex gap-4 overflow-x-auto"><div className="flex gap-4">{files.map((f, i) => <div key={i} className="w-20 h-20 rounded-xl overflow-hidden relative border border-gray-200"><img src={URL.createObjectURL(f)} className="w-full h-full object-cover" /><button onClick={()=>setFiles(files.filter((_, idx)=>idx!==i))} className="absolute top-1 right-1 bg-white/90 rounded p-1 text-red-500"><i className="fa-solid fa-xmark text-[10px]"></i></button></div>)}</div></div>}
                                <div className="mt-8 flex justify-end"><Button onClick={()=>setStep(2)} disabled={files.length===0} size="lg">Weiter</Button></div>
                            </Card>
                        )}

                        {step === 2 && (
                            <Card className="p-8 md:p-12">
                                <h2 className="text-2xl font-extrabold mb-8 border-b border-gray-100 pb-4"><i className="fa-solid fa-sliders text-vinted-500 mr-2"></i> Metadaten & KI-Setup</h2>
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-6 mb-8">
                                    <Select label="Kategorie" value={data.category} onChange={e=>setData({...data, category: e.target.value})} options={VINTED_DATA.categories} icon="fa-layer-group" />
                                    <Select label="Zustand" value={data.condition} onChange={e=>setData({...data, condition: e.target.value})} options={VINTED_DATA.conditions} icon="fa-star" />
                                    <Select label="Farbe" value={data.color} onChange={e=>setData({...data, color: e.target.value})} options={VINTED_DATA.colors} icon="fa-palette" />
                                    <Select label="Material" value={data.material} onChange={e=>setData({...data, material: e.target.value})} options={VINTED_DATA.materials} icon="fa-scissors" />
                                    <Input className="sm:col-span-2" label="Marke" value={data.brand} onChange={e=>setData({...data, brand: e.target.value})} icon="fa-copyright" placeholder="Optional" />
                                </div>
                                <div className="mb-6">
                                    <label className="text-[11px] font-extrabold text-gray-500 uppercase tracking-widest pl-1 mb-3 block">Text-Stil</label>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div onClick={()=>setData({...data, style: 'Detailliert'})} className={`cursor-pointer p-4 rounded-2xl border-2 ${data.style==='Detailliert'?'border-vinted-500 bg-white':'border-gray-200 bg-gray-50'}`}><h4 className="font-bold">Ausführlich</h4></div>
                                        <div onClick={()=>setData({...data, style: 'Kurz'})} className={`cursor-pointer p-4 rounded-2xl border-2 ${data.style==='Kurz'?'border-vinted-500 bg-white':'border-gray-200 bg-gray-50'}`}><h4 className="font-bold">Kurz & Knapp</h4></div>
                                    </div>
                                </div>
                                <div className="mb-8">
                                    <label className="text-[11px] font-extrabold text-gray-500 uppercase tracking-widest pl-1 mb-3 block">Pricing-Strategie</label>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div onClick={()=>setData({...data, pricingStrategy: 'Pessimistisch'})} className={`cursor-pointer p-4 rounded-2xl border-2 ${data.pricingStrategy==='Pessimistisch'?'border-blue-500 bg-white':'border-gray-200 bg-gray-50'}`}><h4 className="font-bold">Pessimistisch</h4></div>
                                        <div onClick={()=>setData({...data, pricingStrategy: 'Optimistisch'})} className={`cursor-pointer p-4 rounded-2xl border-2 ${data.pricingStrategy==='Optimistisch'?'border-blue-500 bg-white':'border-gray-200 bg-gray-50'}`}><h4 className="font-bold">Optimistisch</h4></div>
                                    </div>
                                </div>
                                <div className="mb-8 p-5 bg-gray-900 rounded-2xl flex justify-between items-center cursor-pointer" onClick={()=>setData({...data, deepAnalysis: !data.deepAnalysis})}>
                                    <div><h4 className="font-bold text-white"><i className="fa-solid fa-chart-pie text-vinted-400 mr-2"></i> Deep Market Research</h4></div>
                                    <div className={`w-12 h-6 rounded-full relative ${data.deepAnalysis?'bg-vinted-500':'bg-gray-700'}`}><div className={`absolute top-1 w-4 h-4 rounded-full bg-white transition-transform ${data.deepAnalysis?'left-7':'left-1'}`}></div></div>
                                </div>
                                <div className="flex justify-between pt-6 border-t border-gray-100">
                                    <Button variant="secondary" onClick={()=>setStep(1)}>Zurück</Button>
                                    <Button onClick={runAnalysis} variant="primary" icon="fa-wand-magic-sparkles">Analyse starten</Button>
                                </div>
                            </Card>
                        )}

                        {step === 3 && (
                            <div className="py-32 text-center flex flex-col items-center">
                                <i className="fa-solid fa-circle-notch fa-spin text-5xl text-vinted-600 mb-6"></i>
                                <h2 className="text-3xl font-bold mb-3">KI arbeitet...</h2>
                            </div>
                        )}

                        {step === 4 && result && (
                            <div className="space-y-6">
                                <Card noPadding>
                                    <div className="px-6 py-4 bg-gray-50 border-b border-gray-100 flex justify-between items-center"><span className="font-bold text-xs text-gray-500 uppercase">Titel</span><Button variant="ghost" size="sm" onClick={()=>{navigator.clipboard.writeText(result.title); addToast('Kopiert');}}>Kopieren</Button></div>
                                    <div className="p-6 font-black text-xl">{result.title}</div>
                                </Card>
                                <Card noPadding>
                                    <div className="px-6 py-4 bg-gray-50 border-b border-gray-100 flex justify-between items-center"><span className="font-bold text-xs text-gray-500 uppercase">Text</span><Button variant="ghost" size="sm" onClick={()=>{navigator.clipboard.writeText(result.description); addToast('Kopiert');}}>Kopieren</Button></div>
                                    <div className="p-6 whitespace-pre-wrap text-sm font-medium">{result.description}</div>
                                </Card>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    {result.detailed_price_breakdown ? (
                                        <Card className="p-8 bg-gray-900 text-white md:col-span-2">
                                            <h3 className="text-vinted-400 font-bold mb-6 uppercase text-xs">Mega-Preisanalyse</h3>
                                            <div className="grid grid-cols-3 text-center mb-8">
                                                <div><p className="text-xs text-gray-500 uppercase">Low</p><p className="text-2xl font-bold">{parsePrice(result.detailed_price_breakdown.lowest).toFixed(2)}€</p></div>
                                                <div><p className="text-xs text-vinted-400 uppercase">Empfohlen</p><p className="text-4xl font-black text-vinted-400">{parsePrice(result.suggested_price).toFixed(2)}€</p></div>
                                                <div><p className="text-xs text-gray-500 uppercase">High</p><p className="text-2xl font-bold">{parsePrice(result.detailed_price_breakdown.highest).toFixed(2)}€</p></div>
                                            </div>
                                            <p className="text-sm bg-gray-800 p-4 rounded-xl mb-4">{result.detailed_price_breakdown.deep_analysis}</p>
                                        </Card>
                                    ) : (
                                        <Card className="p-6 bg-gray-900 text-white"><p className="text-xs text-gray-400 uppercase mb-2">Preis</p><h3 className="text-4xl font-black text-vinted-400">{parsePrice(result.suggested_price).toFixed(2)} €</h3></Card>
                                    )}
                                    <Card className="p-6"><p className="text-xs text-gray-500 uppercase mb-2">Foto-Score</p><Badge color="amber">{result.image_score}</Badge><p className="mt-3 text-sm">{result.image_tips}</p></Card>
                                    <Card className="p-6"><p className="text-xs text-gray-500 uppercase mb-2">Verkaufs-Tipp</p><p className="text-sm">{result.selling_tips}</p></Card>
                                </div>
                                <div className="pt-6 text-center"><Button variant="secondary" onClick={()=>{setStep(1); setFiles([]); setResult(null);}} className="mx-auto">Neues Listing</Button></div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // --- INVENTORY ---
        const Inventory = ({ setView }) => {
            const { listings, actions, addToast } = useAppContext();
            const [search, setSearch] = useState('');
            const [filter, setFilter] = useState('all');
            const [showManual, setShowManual] = useState(false);
            const [m, setM] = useState({ title: '', price: '', category: VINTED_DATA.categories[8], condition: VINTED_DATA.conditions[2] });

            const filtered = listings.filter(l => {
                if (!l) return false; 
                const matchS = (l.title||'').toLowerCase().includes(search.toLowerCase());
                const matchF = filter === 'all' || l.status === filter;
                return matchS && matchF;
            });

            const add = () => { actions.addListing({ id: Date.now().toString(), title: m.title||'Neu', price: parsePrice(m.price), category: m.category, condition: m.condition, status: 'active', shipping_status: 'pack', date: new Date().toISOString() }); setShowManual(false); addToast("Hinzugefügt!"); };

            return (
                <div className="p-6 lg:p-12 max-w-7xl mx-auto h-full overflow-y-auto pb-32">
                    <div className="mb-10 flex justify-between items-end">
                        <div><h1 className="text-4xl font-extrabold">Inventar</h1></div>
                        <Button onClick={()=>setShowManual(true)} icon="fa-plus">Manuell Hinzufügen</Button>
                    </div>
                    <Card className="flex flex-col h-[600px] p-0">
                        <div className="p-4 border-b flex gap-4 bg-gray-50">
                            <Input value={search} onChange={e=>setSearch(e.target.value)} icon="fa-magnifying-glass" placeholder="Suchen..." className="flex-1" />
                            <Select value={filter} onChange={e=>setFilter(e.target.value)} options={["all", "active", "sold", "paused"]} className="w-48" />
                        </div>
                        <div className="flex-1 overflow-y-auto p-0 bg-white">
                            <table className="w-full text-left border-collapse">
                                <thead className="bg-gray-50 sticky top-0 border-b"><tr><th className="p-4 text-xs">Artikel</th><th className="p-4 text-xs">Preis</th><th className="p-4 text-xs">Status</th><th className="p-4 text-xs"></th></tr></thead>
                                <tbody>
                                    {filtered.map(item => (
                                        <tr key={item.id} className="border-b hover:bg-gray-50">
                                            <td className="p-4 font-bold text-sm">{item.title}</td>
                                            <td className="p-4 font-black">{parsePrice(item.price).toFixed(2)} €</td>
                                            <td className="p-4">
                                                <select value={item.status} onChange={e => actions.updateListing(item.id, {status: e.target.value})} className="bg-transparent font-bold text-sm outline-none cursor-pointer"><option value="active">Aktiv</option><option value="sold">Verkauft</option></select>
                                            </td>
                                            <td className="p-4 text-right"><button onClick={()=>actions.deleteListing(item.id)} className="text-red-500 p-2"><i className="fa-solid fa-trash"></i></button></td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </Card>

                    {showManual && (
                        <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
                            <Card className="w-full max-w-md">
                                <h2 className="text-2xl font-bold mb-6">Manuell Hinzufügen</h2>
                                <div className="space-y-4 mb-6">
                                    <Input label="Titel" value={m.title} onChange={e=>setM({...m, title: e.target.value})} />
                                    <Input label="Preis" type="number" value={m.price} onChange={e=>setM({...m, price: e.target.value})} />
                                    <Select label="Kategorie" value={m.category} onChange={e=>setM({...m, category: e.target.value})} options={VINTED_DATA.categories} />
                                </div>
                                <div className="flex gap-4"><Button variant="secondary" onClick={()=>setShowManual(false)} className="flex-1">Abbrechen</Button><Button onClick={add} className="flex-1">Speichern</Button></div>
                            </Card>
                        </div>
                    )}
                </div>
            );
        };

        // --- DEAL CHECKER PRO ---
        const DealChecker = () => {
            const { addToast, settings } = useAppContext();
            const [links, setLinks] = useState("");
            const [files, setFiles] = useState([]);
            const [purchasePrice, setPurchasePrice] = useState("");
            const [margin, setMargin] = useState(40);
            const [loading, setLoading] = useState(false);
            const [result, setResult] = useState(null);

            const handleCheck = async () => {
                if(!links && files.length===0) return addToast("Infos fehlen", "warning");
                setLoading(true); setResult(null);
                try {
                    const b64s = []; for(let f of files) b64s.push(await fileToBase64(f));
                    const prompt = `Analysiere Reselling Deal: ${links}. Preis: ${purchasePrice||0}€. Marge: ${margin}%. GIB NUR JSON: {"item_name":"Name", "estimated_sell_price":50, "calculated_profit":10, "max_buy_price":20, "worth_it":true, "deep_analysis":"Text", "action_steps":["Schritt"], "red_flags":["Warnung"]}`;
                    const res = await callGemini(prompt, b64s, settings?.apiModel);
                    setResult(res);
                } catch(e) { addToast(e.message, "error"); } finally { setLoading(false); }
            };

            return (
                <div className="p-6 lg:p-12 max-w-[1600px] mx-auto h-full overflow-y-auto pb-32">
                    <h1 className="text-4xl font-extrabold mb-10">Deal Checker</h1>
                    <div className="grid grid-cols-1 xl:grid-cols-2 gap-8">
                        <div className="space-y-6">
                            <Card className="p-8">
                                <h2 className="font-bold mb-4">1. Infos</h2>
                                <Input multiline rows={3} value={links} onChange={e=>setLinks(e.target.value)} placeholder="Link oder Text..." />
                                <input type="file" multiple accept="image/*" onChange={(e) => setFiles(p => [...p, ...Array.from(e.target.files)])} className="mt-4 block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-vinted-50 file:text-vinted-700 hover:file:bg-vinted-100" />
                            </Card>
                            <Card className="p-8">
                                <h2 className="font-bold mb-4">2. Kalkulation</h2>
                                <div className="grid grid-cols-2 gap-4 mb-6">
                                    <Input label="VK Preis (€)" type="number" value={purchasePrice} onChange={e=>setPurchasePrice(e.target.value)} />
                                    <div><label className="text-[11px] font-bold uppercase text-gray-500">Marge: {margin}%</label><input type="range" min="10" max="100" step="5" value={margin} onChange={e=>setMargin(Number(e.target.value))} className="mt-2 w-full"/></div>
                                </div>
                                <Button onClick={handleCheck} loading={loading} className="w-full">Analysieren</Button>
                            </Card>
                        </div>
                        <div>
                            {loading && <Card className="h-full flex items-center justify-center p-12"><i className="fa-solid fa-circle-notch fa-spin text-4xl text-vinted-600"></i></Card>}
                            {result && !loading && (
                                <Card className={`h-full border-t-8 ${result.worth_it ? 'border-t-green-500' : 'border-t-red-500'}`}>
                                    <h2 className={`text-4xl font-black mb-2 ${result.worth_it ? 'text-green-600' : 'text-red-600'}`}>{result.worth_it ? 'Zuschlagen!' : 'Finger weg!'}</h2>
                                    <p className="font-bold text-xl mb-8">{result.item_name}</p>
                                    <div className="grid grid-cols-3 gap-4 mb-8 text-center">
                                        <div className="bg-gray-50 p-4 rounded-xl"><p className="text-xs uppercase">Est. Wert</p><p className="text-2xl font-black">{parsePrice(result.estimated_sell_price).toFixed(2)}€</p></div>
                                        <div className="bg-gray-50 p-4 rounded-xl"><p className="text-xs uppercase">Max Ankauf</p><p className="text-2xl font-black">{result.max_buy_price}€</p></div>
                                        <div className="bg-vinted-50 p-4 rounded-xl"><p className="text-xs uppercase text-vinted-700">Gewinn</p><p className="text-2xl font-black text-vinted-600">{parsePrice(result.calculated_profit).toFixed(2)}€</p></div>
                                    </div>
                                    <p className="text-sm bg-gray-50 p-4 rounded-xl font-medium">{result.deep_analysis}</p>
                                </Card>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // --- SNIPER ---
        const Sniper = () => {
            const { alerts, actions, addToast } = useAppContext();
            const [brand, setBrand] = useState("");
            const addAlert = () => { if(brand) { actions.addAlert({ brand }); setBrand(""); addToast("Gespeichert"); }};
            return (
                <div className="p-6 lg:p-12 max-w-4xl mx-auto h-full overflow-y-auto pb-32">
                    <h1 className="text-4xl font-extrabold mb-8">Sniper</h1>
                    <Card className="mb-8 p-6 flex gap-4 bg-gray-900"><Input value={brand} onChange={e=>setBrand(e.target.value)} placeholder="Marke/Item" className="flex-1" /><Button onClick={addAlert}>Hinzufügen</Button></Card>
                    <div className="space-y-4">
                        {alerts.map(a => a && (
                            <Card key={a.id} className="flex justify-between items-center p-5">
                                <p className="font-bold text-lg">{a.brand}</p>
                                <div className="flex gap-2">
                                    <Button variant="vinted" onClick={()=>window.open(`https://www.vinted.de/vetements?search_text=${encodeURIComponent(a.brand)}&order=newest_first`)}>Vinted</Button>
                                    <Button variant="secondary" onClick={()=>window.open(`https://www.kleinanzeigen.de/s-sortierung:erstellungsdatum/${encodeURIComponent(a.brand).replace(/%20/g, '-')}/k0`)}>Ebay</Button>
                                    <Button variant="danger" onClick={()=>actions.deleteAlert(a.id)} icon="fa-trash"></Button>
                                </div>
                            </Card>
                        ))}
                    </div>
                </div>
            );
        };

        // --- SMART REPLY ---
        const SmartReply = () => {
            const { addToast } = useAppContext();
            const [price, setPrice] = useState("");
            const copy = (txt) => { navigator.clipboard.writeText(txt); addToast("Kopiert!"); };
            return (
                <div className="p-6 lg:p-12 max-w-4xl mx-auto h-full overflow-y-auto pb-32">
                    <h1 className="text-4xl font-extrabold mb-8">Smart Reply</h1>
                    <div className="mb-8 w-48"><Input type="number" placeholder="Preis (€)" value={price} onChange={e=>setPrice(e.target.value)} icon="fa-euro-sign"/></div>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <Card className="p-6"><h3 className="font-bold mb-3">Interesse</h3><p className="text-sm mb-4">Moin! 👋 Freut mich, dass dir der Artikel gefällt. Sag Bescheid, falls du Fragen hast!</p><Button onClick={()=>copy("Moin! 👋 Freut mich, dass dir der Artikel gefällt. Sag Bescheid, falls du Fragen hast!")} className="w-full">Kopieren</Button></Card>
                        <Card className="p-6"><h3 className="font-bold mb-3">Gegenangebot</h3><p className="text-sm mb-4">Moin! 👋 Danke fürs Angebot. Meine Schmerzgrenze liegt bei {price||'X'} €. Deal?</p><Button onClick={()=>copy(`Moin! 👋 Danke fürs Angebot. Meine Schmerzgrenze liegt bei ${price||'X'} €. Deal?`)} className="w-full">Kopieren</Button></Card>
                        <Card className="p-6"><h3 className="font-bold mb-3">Verkauft</h3><p className="text-sm mb-4">Moin! 👋 Danke für den Kauf! Paket geht schnellstmöglich sicher verpackt auf die Reise.</p><Button onClick={()=>copy("Moin! 👋 Danke für den Kauf! Paket geht schnellstmöglich sicher verpackt auf die Reise.")} className="w-full">Kopieren</Button></Card>
                        <Card className="p-6"><h3 className="font-bold mb-3">Verschickt</h3><p className="text-sm mb-4">Moin! 👋 Paket ist auf dem Weg. Tracking ist hinterlegt. Viel Spaß damit!</p><Button onClick={()=>copy("Moin! 👋 Paket ist auf dem Weg. Tracking ist hinterlegt. Viel Spaß damit!")} className="w-full">Kopieren</Button></Card>
                    </div>
                </div>
            );
        };

        // --- ROUTENPLANER ---
        const ShippingRoutePlanner = () => {
            const { routeStops, actions } = useAppContext();
            const [startLoc, setStartLoc] = useState("");
            return (
                <div className="p-6 lg:p-12 max-w-4xl mx-auto h-full overflow-y-auto pb-32">
                    <h1 className="text-4xl font-extrabold mb-8">Routenplaner</h1>
                    <Card className="mb-8 p-6"><Input label="Startpunkt" value={startLoc} onChange={e=>setStartLoc(e.target.value)} placeholder="Zuhause" /></Card>
                    <div className="flex gap-2 mb-8">{VINTED_DATA.carriers.map(c => <Button key={c} variant="secondary" onClick={()=>actions.addRouteStop(c)}>+ {c}</Button>)}</div>
                    <div className="space-y-4 mb-8">
                        {routeStops.map(s => s && (
                            <Card key={s.id} className="p-4 flex gap-4 items-center">
                                <h3 className="font-bold w-24">{s.carrier}</h3>
                                <Input value={s.notes} onChange={e=>actions.updateRouteStop(s.id, e.target.value)} placeholder="Pakete..." className="flex-1" />
                                <Button variant="danger" onClick={()=>actions.deleteRouteStop(s.id)} icon="fa-trash"></Button>
                            </Card>
                        ))}
                    </div>
                    <Button size="lg" className="w-full" onClick={()=>window.open(`https://www.google.com/maps/dir/?api=1&origin=$${encodeURIComponent(startLoc)}&waypoints=${routeStops.map(s=>encodeURIComponent(s.carrier+' Paketshop')).join('|')}`)}>Route in Maps öffnen</Button>
                </div>
            );
        };

        // --- PROFIT TRACKER ---
        const ProfitTracker = () => {
            const { listings } = useAppContext();
            const sold = listings.filter(l => l?.status === 'sold');
            const rev = sold.reduce((s, l) => s + parsePrice(l?.price), 0);
            const cost = sold.reduce((s, l) => s + parsePrice(l?.buy_price), 0);
            const profit = rev - cost;

            return (
                <div className="p-6 lg:p-12 max-w-5xl mx-auto h-full overflow-y-auto pb-32">
                    <h1 className="text-4xl font-extrabold mb-8">Kassenbuch</h1>
                    <div className="grid grid-cols-3 gap-6 mb-8 text-center">
                        <Card className="p-8"><p className="text-gray-500 uppercase text-xs font-bold">Umsatz</p><h3 className="text-3xl font-black">{rev.toFixed(2)}€</h3></Card>
                        <Card className="p-8"><p className="text-gray-500 uppercase text-xs font-bold">Ausgaben</p><h3 className="text-3xl font-black text-red-500">{cost.toFixed(2)}€</h3></Card>
                        <Card className="p-8 bg-gray-900 text-white"><p className="text-gray-400 uppercase text-xs font-bold">Gewinn</p><h3 className="text-3xl font-black text-vinted-400">{profit.toFixed(2)}€</h3></Card>
                    </div>
                </div>
            );
        };

        // --- SETTINGS ---
        const Settings = () => {
            const { settings, actions, addToast } = useAppContext();
            const [local, setLocal] = useState(settings||{});
            return (
                <div className="p-6 lg:p-12 max-w-3xl mx-auto h-full overflow-y-auto pb-32">
                    <h1 className="text-4xl font-extrabold mb-8">Einstellungen</h1>
                    <div className="grid grid-cols-2 gap-4 mb-8">
                        <Card className="p-6 text-center cursor-pointer hover:bg-gray-50" onClick={actions.exportData}><i className="fa-solid fa-download text-2xl mb-2"></i><p className="font-bold">Backup Export</p></Card>
                        <Card className="p-6 text-center cursor-pointer hover:bg-gray-50" onClick={()=>document.getElementById('fileIn').click()}><i className="fa-solid fa-upload text-2xl mb-2"></i><p className="font-bold">Backup Import</p><input type="file" id="fileIn" className="hidden" accept=".json" onChange={e => { const r = new FileReader(); r.onload = ev => actions.importData(JSON.parse(ev.target.result)); r.readAsText(e.target.files[0]); }} /></Card>
                    </div>
                    <Card className="p-8 space-y-6">
                        <Input label="Name" value={local.userName} onChange={e=>setLocal({...local, userName: e.target.value})} />
                        <Input label="Signatur" value={local.signature} onChange={e=>setLocal({...local, signature: e.target.value})} />
                        <Select label="KI Modell" value={local.apiModel} onChange={e=>setLocal({...local, apiModel: e.target.value})} options={['gemini-1.5-flash', 'gemini-flash-latest', 'gemini-1.5-pro']} />
                        <Button onClick={()=> {actions.updateSettings(local); addToast("Gespeichert");}} className="w-full">Speichern</Button>
                    </Card>
                </div>
            );
        };

        // --- MAIN APP ---
        const MainApp = () => {
            const [view, setView] = useState('dashboard'); 
            const [isSidebarOpen, setSidebarOpen] = useState(false);
            const { settings } = useAppContext();

            // Sichert ab, dass die App bei undefiniertem View nicht crasht
            const menu = {
                dashboard: { icon: 'fa-grip', label: 'Dashboard', component: <Dashboard setView={setView} /> },
                analyze: { icon: 'fa-wand-magic-sparkles', label: 'Analyse Studio', component: <AnalyzeStudio /> },
                history: { icon: 'fa-box-archive', label: 'Inventar', component: <Inventory setView={setView} /> },
                dealchecker: { icon: 'fa-scale-balanced', label: 'Deal Checker', component: <DealChecker /> },
                sniper: { icon: 'fa-crosshairs', label: 'Sniper', component: <Sniper /> },
                smartreply: { icon: 'fa-comment-dots', label: 'Smart Reply', component: <SmartReply /> },
                shipping: { icon: 'fa-route', label: 'Routenplaner', component: <ShippingRoutePlanner /> },
                profit: { icon: 'fa-chart-pie', label: 'Kassenbuch', component: <ProfitTracker /> },
                settings: { icon: 'fa-gear', label: 'Einstellungen', component: <Settings /> },
            };

            const activeComponent = menu[view]?.component || <div className="p-10 text-center"><i className="fa-solid fa-circle-notch fa-spin text-3xl"></i><p className="mt-4 font-bold">Lade Modul...</p></div>;

            return (
                <div className="flex h-screen w-full overflow-hidden bg-transparent relative z-10">
                    <div className={`fixed inset-0 bg-gray-900/40 backdrop-blur-sm z-40 transition-opacity lg:hidden ${isSidebarOpen ? 'opacity-100' : 'opacity-0 pointer-events-none'}`} onClick={() => setSidebarOpen(false)}></div>
                    <aside className={`fixed lg:relative w-[280px] bg-white/80 backdrop-blur-xl border-r border-white/50 h-full flex flex-col z-50 transition-transform ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full lg:translate-x-0'}`}>
                        <div className="h-24 flex items-center px-8 border-b border-gray-200/50 shrink-0"><div className="w-10 h-10 bg-gray-900 rounded-xl flex items-center justify-center text-white mr-4"><i className="fa-solid fa-shirt"></i></div><span className="text-2xl font-extrabold">Vinted<span className="text-vinted-600">Pro</span></span></div>
                        <nav className="flex-1 py-8 px-4 space-y-1.5 overflow-y-auto no-scrollbar">
                            {Object.entries(menu).map(([id, item]) => (
                                <button key={id} onClick={() => { setView(id); setSidebarOpen(false); }} className={`w-full flex items-center gap-4 px-4 py-3 rounded-2xl transition-all font-bold text-sm ${view === id ? 'bg-white text-vinted-600 shadow-sm border border-gray-100' : 'text-gray-500 hover:bg-white/50'}`}><i className={`fa-solid ${item.icon} w-6`}></i>{item.label}</button>
                            ))}
                        </nav>
                    </aside>
                    <main className="flex-1 flex flex-col min-w-0 h-full relative z-0">
                        <header className="h-16 bg-white/80 backdrop-blur-md border-b border-gray-200/50 flex items-center px-4 shrink-0 lg:hidden z-20"><button onClick={() => setSidebarOpen(true)} className="w-10 h-10 flex items-center justify-center rounded-xl hover:bg-gray-100"><i className="fa-solid fa-bars text-lg"></i></button><span className="font-bold ml-2">{menu[view]?.label}</span></header>
                        <div className="flex-1 relative z-10 overflow-hidden">
                            {activeComponent}
                        </div>
                    </main>
                </div>
            );
        };

        const RootApp = () => <ErrorBoundary><AppProvider><MainApp /></AppProvider></ErrorBoundary>;
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<RootApp />);
    </script>
</body>
</html>
