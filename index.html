<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VintedPro v18 - Flohmarkt Edition</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { vinted: { 50: '#faf5ff', 100: '#f3e8ff', 200: '#e9d5ff', 300: '#d8b4fe', 400: '#c084fc', 500: '#a855f7', 600: '#9333ea', 700: '#7e22ce', 800: '#6b21a8', 900: '#581c87' } },
                    boxShadow: { 'card': '0 8px 30px rgba(0, 0, 0, 0.04), 0 4px 10px rgba(0, 0, 0, 0.02)', 'floating': '0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04)' }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f4f5f7; color: #111827; overflow: hidden; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .glass-effect { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.5); }
        input[type=range] { -webkit-appearance: none; background: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 20px; width: 20px; border-radius: 50%; background: #9333ea; margin-top: -7px; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        input[type=range]::-webkit-slider-runnable-track { height: 6px; background: #e5e7eb; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="root" class="h-full w-full"></div>
    <script type="text/babel">
        const { useState, useEffect, createContext, useContext, Component, useMemo } = React;

        // Sicherer Parser für KI-Antworten
        const safeJsonParse = (text) => {
            try {
                const match = text.match(/\{[\s\S]*\}/);
                return JSON.parse(match ? match[0] : text);
            } catch (e) {
                console.error("JSON Parsing Error:", e);
                throw new Error("Die KI hat ein ungültiges Format geliefert. Bitte erneut versuchen.");
            }
        };

        const parsePrice = (val) => {
            if (!val) return 0;
            if (typeof val === 'number') return isNaN(val) ? 0 : val;
            const cleaned = String(val).replace(/[^\d.,-]/g, '').replace(',', '.');
            const num = parseFloat(cleaned);
            return isNaN(num) ? 0 : num;
        };

        class ErrorBoundary extends Component {
            constructor(props) { super(props); this.state = { hasError: false }; }
            static getDerivedStateFromError(error) { return { hasError: true }; }
            render() {
                if (this.state.hasError) return (
                    <div className="min-h-screen flex flex-col items-center justify-center bg-white p-6 text-center">
                        <i className="fa-solid fa-triangle-exclamation text-5xl text-amber-500 mb-4"></i>
                        <h1 className="text-2xl font-bold">Ups! Etwas lief schief.</h1>
                        <button onClick={() => window.location.reload()} className="mt-4 bg-gray-900 text-white px-6 py-3 rounded-2xl font-bold">Neu laden</button>
                    </div>
                );
                return this.props.children; 
            }
        }

        const API_KEY = "AIzaSyBIcM5Tr0Z0FNTLObfQnJGmoY0JkqGblew";
        const VINTED_DATA = {
            categories: ["Damenbekleidung", "Herrenbekleidung", "Sneaker & Schuhe", "Vintage & Y2K", "Taschen & Accessoires", "Kinder & Baby", "Home & Deko", "Elektronik", "Sonstiges"],
            conditions: ["Neu mit Etikett", "Neu ohne Etikett", "Sehr gut", "Gut", "Zufriedenstellend"],
            colors: ["Schwarz", "Weiß", "Grau", "Blau", "Rot", "Grün", "Gelb", "Braun", "Beige", "Lila", "Pink", "Gold", "Silber", "Mehrfarbig"],
            materials: ["Nicht angegeben", "100% Baumwolle", "Polyester", "Leder", "Kunstleder", "Seide", "Leinen", "Wolle", "Denim", "Mischgewebe"],
            carriers: ["DHL", "Hermes", "GLS", "DPD", "PostAT"]
        };

        const fileToBase64 = (file) => new Promise((res, rej) => {
            const r = new FileReader(); r.readAsDataURL(file);
            r.onload = () => res({ mimeType: file.type, data: r.result.split(',')[1] });
            r.onerror = rej;
        });

        const callGemini = async (prompt, images = [], model = "gemini-1.5-flash") => {
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${API_KEY}`, {
                    method: "POST", headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }, ...images.map(img => ({ inlineData: { mimeType: img.mimeType, data: img.data } }))] }],
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });
                if (!res.ok) throw new Error(`KI-Dienst nicht erreichbar (${res.status})`);
                const data = await res.json();
                return safeJsonParse(data.candidates[0].content.parts[0].text);
            } catch (e) {
                throw new Error(e.message);
            }
        };

        const AppContext = createContext(null);
        const AppProvider = ({ children }) => {
            const [toasts, setToasts] = useState([]);
            const useStickyState = (def, key) => {
                const [val, setVal] = useState(() => {
                    const s = window.localStorage.getItem(key);
                    return s ? JSON.parse(s) : def;
                });
                useEffect(() => { window.localStorage.setItem(key, JSON.stringify(val)); }, [key, val]);
                return [val, setVal];
            };

            const [listings, setListings] = useStickyState([], 'vpro_listings_v18');
            const [alerts, setAlerts] = useStickyState([], 'vpro_alerts_v18');
            const [routeStops, setRouteStops] = useStickyState([], 'vpro_routes_v18');
            const [settings, setSettings] = useStickyState({ userName: 'Rico', signature: 'LG Rico 😁', apiModel: 'gemini-1.5-flash' }, 'vpro_settings_v18');

            const addToast = (msg, type = 'success') => {
                const id = Date.now();
                setToasts(p => [...p, { id, msg, type }]);
                setTimeout(() => setToasts(p => p.filter(t => t.id !== id)), 3000);
            };

            const actions = {
                addListing: (l) => setListings(p => [l, ...p]),
                updateListing: (id, u) => setListings(p => p.map(l => l.id === id ? { ...l, ...u } : l)),
                deleteListing: (id) => setListings(p => p.filter(l => l.id !== id)),
                addAlert: (a) => setAlerts(p => [{...a, id: Date.now()}, ...p]),
                deleteAlert: (id) => setAlerts(p => p.filter(a => a.id !== id)),
                addRouteStop: (carrier) => setRouteStops(p => [...p, { id: Date.now(), carrier, notes: '' }]),
                updateRouteStop: (id, notes) => setRouteStops(p => p.map(s => s.id === id ? {...s, notes} : s)),
                deleteRouteStop: (id) => setRouteStops(p => p.filter(s => s.id !== id)),
                updateSettings: (u) => setSettings(p => ({...p, ...u}))
            };

            return (
                <AppContext.Provider value={{ listings, alerts, routeStops, settings, actions, addToast }}>
                    {children}
                    <div className="fixed bottom-6 right-6 z-[100] flex flex-col gap-3 pointer-events-none">
                        {toasts.map(t => (
                            <div key={t.id} className="animate-slide-up glass-effect bg-white/95 px-5 py-4 rounded-2xl shadow-floating pointer-events-auto border-l-4 w-72" style={{borderLeftColor: t.type === 'error' ? '#ef4444' : '#10b981'}}>
                                <p className="font-bold text-sm">{t.msg}</p>
                            </div>
                        ))}
                    </div>
                </AppContext.Provider>
            );
        };
        const useAppContext = () => useContext(AppContext);

        // UI Komponenten
        const Card = ({ children, className = "", noPadding = false, onClick }) => (
            <div onClick={onClick} className={`bg-white rounded-3xl shadow-card border border-gray-100 overflow-hidden ${onClick ? 'cursor-pointer active:scale-[0.98] transition-all' : ''} ${noPadding ? '' : 'p-6'} ${className}`}>{children}</div>
        );
        const Button = ({ children, onClick, variant = 'primary', icon, loading = false, className = "", size="md" }) => {
            const v = { primary: "bg-gray-900 text-white", vinted: "bg-vinted-600 text-white", secondary: "bg-gray-100 text-gray-700", danger: "bg-red-50 text-red-600" };
            const s = { sm: "py-2 px-4 text-xs rounded-xl", md: "py-3 px-6 text-sm rounded-2xl", lg: "py-4 px-8 text-base rounded-2xl" };
            return (
                <button onClick={onClick} disabled={loading} className={`flex items-center justify-center font-bold transition-all active:scale-95 disabled:opacity-50 ${v[variant]} ${s[size]} ${className}`}>
                    {loading ? <i className="fa-solid fa-circle-notch fa-spin"></i> : <><i className={`fa-solid ${icon} ${children ? 'mr-2' : ''}`}></i>{children}</>}
                </button>
            );
        };
        const Input = ({ label, type="text", value, onChange, placeholder, icon, multiline=false, rows=4, className="", disabled=false, list }) => (
            <div className={`flex flex-col gap-1.5 ${className}`}>
                {label && <label className="text-[11px] font-extrabold text-gray-500 uppercase tracking-widest pl-1">{label}</label>}
                <div className="relative group">
                    {icon && <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400"><i className={`fa-solid ${icon}`}></i></div>}
                    {multiline ? <textarea rows={rows} value={value} onChange={onChange} disabled={disabled} placeholder={placeholder} className={`block w-full rounded-2xl border border-gray-200 bg-gray-50/50 p-3.5 sm:text-sm resize-none outline-none focus:bg-white focus:border-vinted-500 ${icon?'pl-11':''}`}></textarea> : <input type={type} value={value} onChange={onChange} disabled={disabled} placeholder={placeholder} list={list} className={`block w-full rounded-2xl border border-gray-200 bg-gray-50/50 p-3.5 sm:text-sm outline-none focus:bg-white focus:border-vinted-500 ${icon?'pl-11':''}`} />}
                </div>
            </div>
        );
        const Select = ({ label, value, onChange, options, icon }) => (
            <div className="flex flex-col gap-1.5">
                {label && <label className="text-[11px] font-extrabold text-gray-500 uppercase tracking-widest pl-1">{label}</label>}
                <div className="relative">
                    {icon && <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400"><i className={`fa-solid ${icon}`}></i></div>}
                    <select value={value} onChange={onChange} className={`appearance-none block w-full rounded-2xl border border-gray-200 bg-gray-50/50 font-semibold p-3.5 pr-10 sm:text-sm outline-none focus:bg-white focus:border-vinted-500 ${icon?'pl-11':''}`}>{options.map(o => <option key={o} value={o}>{o}</option>)}</select>
                    <div className="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none text-gray-400"><i className="fa-solid fa-chevron-down text-xs"></i></div>
                </div>
            </div>
        );
        const Badge = ({ children, color = 'gray', className = "" }) => {
            const c = { gray: "bg-gray-100 text-gray-700", amber: "bg-amber-50 text-amber-700" };
            return <span className={`inline-flex items-center px-2.5 py-0.5 rounded-lg text-xs font-bold border border-black/5 ${c[color]||c.gray} ${className}`}>{children}</span>;
        };

        // --- DASHBOARD ---
        const Dashboard = ({ setView }) => {
            const { listings, settings } = useAppContext();
            const active = listings.filter(l => l?.status === 'active');
            const sold = listings.filter(l => l?.status === 'sold');
            const revenue = sold.reduce((acc, curr) => acc + parsePrice(curr?.price), 0);
            const recent = [...listings].slice(0, 4);

            return (
                <div className="p-6 lg:p-12 max-w-[1600px] mx-auto h-full overflow-y-auto pb-32">
                    <div className="mb-10 flex flex-col md:flex-row md:items-end justify-between gap-4">
                        <div><h1 className="text-4xl md:text-5xl font-extrabold text-gray-900 tracking-tight">Übersicht</h1><p className="text-gray-500 mt-2 font-medium">Moin, {settings?.userName || 'Rico'}! Lass uns Geld verdienen.</p></div>
                        <Button variant="vinted" onClick={()=>setView('analyze')} icon="fa-plus" size="lg">Neues Inserat</Button>
                    </div>
                    <div className="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-6 mb-12">
                        <Card className="flex flex-col justify-between p-6"><div className="w-12 h-12 rounded-2xl bg-blue-50 text-blue-600 flex items-center justify-center mb-4"><i className="fa-solid fa-boxes-stacked text-xl"></i></div><p className="text-sm font-bold text-gray-500">Aktiv im Store</p><h3 className="text-3xl font-black">{active.length}</h3></Card>
                        <Card className="flex flex-col justify-between p-6"><div className="w-12 h-12 rounded-2xl bg-green-50 text-green-600 flex items-center justify-center mb-4"><i className="fa-solid fa-handshake text-xl"></i></div><p className="text-sm font-bold text-gray-500">Verkauft</p><h3 className="text-3xl font-black">{sold.length}</h3></Card>
                        <Card className="flex flex-col justify-between p-6"><div className="w-12 h-12 rounded-2xl bg-amber-50 text-amber-600 flex items-center justify-center mb-4"><i className="fa-solid fa-box-archive text-xl"></i></div><p className="text-sm font-bold text-gray-500">Inventar gesamt</p><h3 className="text-3xl font-black">{listings.length}</h3></Card>
                        <Card className="flex flex-col justify-between bg-gray-900 text-white p-6"><div className="w-12 h-12 rounded-2xl bg-gray-800 text-white border border-gray-700 flex items-center justify-center mb-4"><i className="fa-solid fa-sack-dollar text-xl"></i></div><p className="text-sm font-bold text-gray-400">Gesamtumsatz</p><h3 className="text-3xl font-black">{revenue.toFixed(2)} €</h3></Card>
                    </div>
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                        <Card className="p-8"><h3 className="text-xl font-extrabold text-gray-900 mb-6">Quick Tools für den Flohmarkt</h3>
                            <div className="grid grid-cols-2 gap-4">
                                <button onClick={()=>setView('dealchecker')} className="p-6 rounded-2xl bg-white hover:shadow-md border border-gray-200 text-left active:scale-95 transition-all"><i className="fa-solid fa-bolt text-amber-500 mb-2 text-3xl"></i><p className="font-bold text-gray-900 mt-2">Flohmarkt Check</p><p className="text-xs text-gray-500 mt-1">Blitz-Analyse am Stand</p></button>
                                <button onClick={()=>setView('sniper')} className="p-6 rounded-2xl bg-white hover:shadow-md border border-gray-200 text-left active:scale-95 transition-all"><i className="fa-solid fa-crosshairs text-red-500 mb-2 text-3xl"></i><p className="font-bold text-gray-900 mt-2">Snipe Radar</p><p className="text-xs text-gray-500 mt-1">Marken überwachen</p></button>
                            </div>
                        </Card>
                        <Card className="flex flex-col p-8">
                            <div className="flex justify-between items-center mb-6"><h3 className="text-xl font-extrabold text-gray-900">Letzte Aktivitäten</h3><Button variant="secondary" size="sm" onClick={()=>setView('history')}>Alle ansehen</Button></div>
                            <div className="space-y-4">
                                {recent.map((item, i) => (
                                    <div key={item.id||i} className="flex items-center gap-4 bg-gray-50/50 p-4 rounded-2xl border border-gray-100">
                                        <div className={`w-12 h-12 rounded-xl flex items-center justify-center shrink-0 ${item.status === 'sold' ? 'bg-green-100 text-green-600' : 'bg-vinted-100 text-vinted-600'}`}><i className={`fa-solid ${item.status === 'sold' ? 'fa-check' : 'fa-sparkles'}`}></i></div>
                                        <div className="flex-1 min-w-0"><p className="font-bold text-gray-900 truncate">{item.title}</p><p className="text-xs font-bold text-gray-500">{item.status === 'sold' ? 'Verkauft' : 'Gelistet'}</p></div>
                                        <p className="font-black text-gray-900">{parsePrice(item.price).toFixed(2)} €</p>
                                    </div>
                                ))}
                                {recent.length===0 && <p className="text-center text-gray-400 py-10">Keine Einträge. Geh auf den Flohmarkt! ;)</p>}
                            </div>
                        </Card>
                    </div>
                </div>
            );
        };

        // --- ANALYZE STUDIO ---
        const AnalyzeStudio = () => {
            const { actions, addToast, settings } = useAppContext();
            const [step, setStep] = useState(1);
            const [files, setFiles] = useState([]);
            const [loading, setLoading] = useState(false);
            const [result, setResult] = useState(null);
            const [data, setData] = useState({ category: VINTED_DATA.categories[0], condition: VINTED_DATA.conditions[2], brand: "" });

            const runAnalysis = async () => {
                setLoading(true); setStep(3);
                try {
                    const b64s = []; for(let f of files) b64s.push(await fileToBase64(f));
                    const prompt = `Du bist ein Vinted-Experte. Analysiere das Bild. Kat: ${data.category}, Zust: ${data.condition}, Marke: ${data.brand||'-'}. Schreibe einen Verkaufstext im lockeren Stil, starte mit "Moin!". Beende ihn mit: "${settings?.signature || ''}" und Privatverkauf-Hinweis.
                    GIB NUR DIESES JSON ZURÜCK: { "title": "SEO-Titel max 60Z", "description": "Fertiger Text", "suggested_price": 25 }`;

                    const parsed = await callGemini(prompt, b64s, settings?.apiModel);
                    setResult(parsed);
                    
                    actions.addListing({ id: Date.now().toString(), title: parsed.title, description: parsed.description, price: parsePrice(parsed.suggested_price), buy_price: 0, status: 'active', date: new Date().toISOString() });
                    addToast("Analyse erfolgreich!"); setStep(4);
                } catch (e) { addToast(e.message, "error"); setStep(2); } finally { setLoading(false); }
            };

            return (
                <div className="p-6 lg:p-12 max-w-5xl mx-auto h-full overflow-y-auto pb-32">
                    <div className="text-center mb-10"><h1 className="text-4xl font-extrabold text-gray-900">Analyse Studio</h1></div>
                    
                    <div className="max-w-3xl mx-auto">
                        {step === 1 && (
                            <Card className="p-8 md:p-14 text-center">
                                <h2 className="text-2xl font-extrabold mb-8">Artikelfotos hochladen</h2>
                                <div className="border-2 border-dashed border-vinted-300 rounded-3xl bg-vinted-50 hover:bg-vinted-100 transition-all p-12 cursor-pointer relative">
                                    <input type="file" multiple accept="image/*" onChange={(e) => setFiles([...files, ...Array.from(e.target.files)])} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" />
                                    <i className="fa-solid fa-camera text-5xl text-vinted-400 mb-4"></i><h3 className="font-bold text-vinted-900 text-lg">Tippen oder Bilder ablegen</h3>
                                </div>
                                {files.length > 0 && <div className="mt-6 flex justify-end"><Button onClick={()=>setStep(2)} size="lg">Weiter</Button></div>}
                            </Card>
                        )}
                        {step === 2 && (
                            <Card className="p-8 md:p-12">
                                <h2 className="text-2xl font-extrabold mb-8">Kurze Infos</h2>
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-6 mb-8">
                                    <Select label="Kategorie" value={data.category} onChange={e=>setData({...data, category: e.target.value})} options={VINTED_DATA.categories} icon="fa-layer-group" />
                                    <Select label="Zustand" value={data.condition} onChange={e=>setData({...data, condition: e.target.value})} options={VINTED_DATA.conditions} icon="fa-star" />
                                    <Input className="sm:col-span-2" label="Marke" value={data.brand} onChange={e=>setData({...data, brand: e.target.value})} icon="fa-copyright" placeholder="Optional" />
                                </div>
                                <div className="flex justify-between pt-6">
                                    <Button variant="secondary" onClick={()=>setStep(1)}>Zurück</Button>
                                    <Button onClick={runAnalysis} variant="vinted" icon="fa-wand-magic-sparkles">Magie starten</Button>
                                </div>
                            </Card>
                        )}
                        {step === 3 && (
                            <div className="py-32 text-center">
                                <i className="fa-solid fa-circle-notch fa-spin text-6xl text-vinted-600 mb-6"></i>
                                <h2 className="text-3xl font-bold">KI generiert das perfekte Listing...</h2>
                            </div>
                        )}
                        {step === 4 && result && (
                            <div className="space-y-6">
                                <Card noPadding>
                                    <div className="px-6 py-4 bg-gray-50 border-b flex justify-between items-center"><span className="font-bold text-xs text-gray-500 uppercase">Titel</span></div>
                                    <div className="p-6 font-black text-xl">{result.title}</div>
                                </Card>
                                <Card noPadding>
                                    <div className="px-6 py-4 bg-gray-50 border-b flex justify-between items-center"><span className="font-bold text-xs text-gray-500 uppercase">Text</span></div>
                                    <div className="p-6 whitespace-pre-wrap text-sm font-medium">{result.description}</div>
                                </Card>
                                <Card className="p-6 bg-gray-900 text-white text-center"><p className="text-xs text-gray-400 uppercase mb-2">Empfohlener Preis</p><h3 className="text-5xl font-black text-vinted-400">{parsePrice(result.suggested_price).toFixed(2)} €</h3></Card>
                                
                                <div className="pt-6 grid grid-cols-1 sm:grid-cols-2 gap-4">
                                    <Button variant="secondary" onClick={()=>{setStep(1); setFiles([]); setResult(null);}} size="lg">Neues Listing</Button>
                                    <Button variant="vinted" icon="fa-arrow-up-right-from-square" size="lg" onClick={()=>{
                                        navigator.clipboard.writeText(`${result.title}\n\n${result.description}`); 
                                        window.open('https://www.vinted.de/items/new', '_blank'); 
                                        addToast('Text kopiert! Vinted öffnet sich...');
                                    }}>Direkt auf Vinted einstellen</Button>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // --- INVENTORY ---
        const Inventory = () => {
            const { listings, actions } = useAppContext();
            return (
                <div className="p-6 lg:p-12 max-w-7xl mx-auto h-full overflow-y-auto pb-32">
                    <h1 className="text-4xl font-extrabold mb-10">Dein Inventar</h1>
                    <Card className="p-0 overflow-hidden">
                        <table className="w-full text-left border-collapse">
                            <thead className="bg-gray-50 border-b"><tr><th className="p-4 text-xs font-bold uppercase text-gray-500">Artikel</th><th className="p-4 text-xs font-bold uppercase text-gray-500">Preis</th><th className="p-4 text-xs font-bold uppercase text-gray-500">Status</th><th className="p-4 text-xs"></th></tr></thead>
                            <tbody>
                                {listings.map(item => (
                                    <tr key={item.id} className="border-b hover:bg-gray-50">
                                        <td className="p-4 font-bold text-sm">{item.title}</td>
                                        <td className="p-4 font-black">{parsePrice(item.price).toFixed(2)} €</td>
                                        <td className="p-4"><select value={item.status} onChange={e => actions.updateListing(item.id, {status: e.target.value})} className="bg-transparent font-bold text-sm outline-none cursor-pointer"><option value="active">Aktiv</option><option value="sold">Verkauft</option></select></td>
                                        <td className="p-4 text-right"><button onClick={()=>actions.deleteListing(item.id)} className="text-red-500 p-2 hover:bg-red-50 rounded-lg"><i className="fa-solid fa-trash"></i></button></td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </Card>
                </div>
            );
        };

        // --- DEAL CHECKER (Flohmarkt Modus) ---
        const DealChecker = () => {
            const { addToast, settings } = useAppContext();
            const [query, setQuery] = useState("");
            const [purchasePrice, setPurchasePrice] = useState("");
            const [loading, setLoading] = useState(false);
            const [result, setResult] = useState(null);

            const handleCheck = async () => {
                if(!query) return addToast("Was gucken wir uns an?", "error");
                setLoading(true); setResult(null);
                try {
                    const prompt = `Du bist ein knallharter Reseller auf einem Flohmarkt. Analysiere dieses Item kurz und präzise: "${query}". Ankaufspreis: ${purchasePrice||0}€. GIB NUR JSON: {"item_name":"Name", "estimated_sell_price":50, "max_buy_price":20, "worth_it":true, "quick_advice":"Ein kurzer Satz ob sich das lohnt oder worauf man achten muss beim Zustand"}`;
                    const res = await callGemini(prompt, [], settings?.apiModel);
                    setResult(res);
                } catch(e) { addToast(e.message, "error"); } finally { setLoading(false); }
            };

            return (
                <div className="p-6 lg:p-12 max-w-4xl mx-auto h-full overflow-y-auto pb-32">
                    <h1 className="text-4xl font-extrabold mb-2 text-gray-900">Flohmarkt Radar</h1>
                    <p className="text-gray-500 font-medium mb-10">Blitzschnelle Entscheidungshilfe direkt am Stand.</p>
                    
                    <Card className="p-6 mb-8 bg-gray-900">
                        <div className="space-y-4">
                            <Input label="Was hast du vor dir?" value={query} onChange={e=>setQuery(e.target.value)} placeholder="Z.B. Vintage Nike Sweater 90s" />
                            <Input label="Soll kosten (€)" type="number" value={purchasePrice} onChange={e=>setPurchasePrice(e.target.value)} placeholder="Preis am Stand" />
                            <Button onClick={handleCheck} loading={loading} variant="vinted" size="lg" className="w-full mt-4" icon="fa-bolt">Lohnt sich das?</Button>
                        </div>
                    </Card>

                    {result && !loading && (
                        <Card className={`border-l-8 ${result.worth_it ? 'border-l-green-500' : 'border-l-red-500'} p-8 text-center animate-slide-up`}>
                            <i className={`fa-solid ${result.worth_it ? 'fa-face-grin-stars text-green-500' : 'fa-skull-crossbones text-red-500'} text-6xl mb-4`}></i>
                            <h2 className={`text-4xl font-black mb-2 ${result.worth_it ? 'text-green-600' : 'text-red-600'}`}>{result.worth_it ? 'KAUFEN!' : 'FINGER WEG!'}</h2>
                            <p className="font-bold text-xl mb-6">{result.item_name}</p>
                            <div className="flex justify-center gap-8 mb-6">
                                <div><p className="text-xs uppercase text-gray-500">Wert auf Vinted</p><p className="text-3xl font-black">{parsePrice(result.estimated_sell_price).toFixed(2)}€</p></div>
                                <div><p className="text-xs uppercase text-gray-500">Max. Ankauf</p><p className="text-3xl font-black">{result.max_buy_price}€</p></div>
                            </div>
                            <p className="bg-gray-100 p-4 rounded-xl font-medium">{result.quick_advice}</p>
                        </Card>
                    )}
                </div>
            );
        };

        // --- SNIPER ---
        const Sniper = () => {
            const { alerts, actions, addToast } = useAppContext();
            const [brand, setBrand] = useState("");
            return (
                <div className="p-6 lg:p-12 max-w-4xl mx-auto h-full overflow-y-auto pb-32">
                    <h1 className="text-4xl font-extrabold mb-8">Sniper Radar</h1>
                    <Card className="mb-8 p-6 flex gap-4"><Input value={brand} onChange={e=>setBrand(e.target.value)} placeholder="Marke eingeben..." className="flex-1" /><Button onClick={()=>{if(brand){actions.addAlert({brand}); setBrand(""); addToast("Gespeichert");}}}>Überwachen</Button></Card>
                    <div className="space-y-4">
                        {alerts.map(a => (
                            <Card key={a.id} className="flex justify-between items-center p-5">
                                <p className="font-bold text-lg">{a.brand}</p>
                                <div className="flex gap-2">
                                    <Button variant="vinted" onClick={()=>window.open(`https://www.vinted.de/vetements?search_text=${encodeURIComponent(a.brand)}&order=newest_first`)} size="sm">Vinted</Button>
                                    <Button variant="danger" onClick={()=>actions.deleteAlert(a.id)} icon="fa-trash" size="sm"></Button>
                                </div>
                            </Card>
                        ))}
                    </div>
                </div>
            );
        };

        // --- SMART REPLY ---
        const SmartReply = () => {
            const { addToast } = useAppContext();
            const copy = (txt) => { navigator.clipboard.writeText(txt); addToast("Kopiert!"); };
            return (
                <div className="p-6 lg:p-12 max-w-5xl mx-auto h-full overflow-y-auto pb-32">
                    <h1 className="text-4xl font-extrabold mb-8">Smart Reply</h1>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <Card className="p-6"><h3 className="font-bold mb-2">Interesse wecken</h3><p className="text-sm mb-4 text-gray-600">Moin! 👋 Freut mich, dass dir das Teil gefällt. Zustand ist top. Sag Bescheid, wenn du Fragen hast!</p><Button onClick={()=>copy("Moin! 👋 Freut mich, dass dir das Teil gefällt. Zustand ist top. Sag Bescheid, wenn du Fragen hast!")} className="w-full">Kopieren</Button></Card>
                        <Card className="p-6"><h3 className="font-bold mb-2">Deal closing</h3><p className="text-sm mb-4 text-gray-600">Moin! 👋 Danke für den Kauf! Geht schnellstmöglich und sicher verpackt auf die Reise zu dir.</p><Button onClick={()=>copy("Moin! 👋 Danke für den Kauf! Geht schnellstmöglich und sicher verpackt auf die Reise zu dir.")} className="w-full">Kopieren</Button></Card>
                    </div>
                </div>
            );
        };

        // --- ROUTENPLANER & PROFIT & SETTINGS ---
        const ShippingRoutePlanner = () => <div className="p-12 text-center"><h1 className="text-3xl font-bold">Routenplaner aktiv (Work in Progress)</h1></div>;
        const ProfitTracker = () => {
            const { listings } = useAppContext();
            const rev = listings.filter(l=>l?.status==='sold').reduce((s, l) => s + parsePrice(l?.price), 0);
            return (
                <div className="p-6 lg:p-12 max-w-4xl mx-auto"><h1 className="text-4xl font-extrabold mb-8">Kassenbuch</h1>
                <Card className="p-10 bg-gray-900 text-white text-center"><p className="text-gray-400 uppercase text-sm font-bold">Umsatz Gesamt</p><h3 className="text-6xl font-black text-vinted-400 mt-2">{rev.toFixed(2)}€</h3></Card></div>
            );
        };
        const Settings = () => {
            const { settings, actions, addToast } = useAppContext();
            return (
                <div className="p-6 lg:p-12 max-w-3xl mx-auto"><h1 className="text-4xl font-extrabold mb-8">Einstellungen</h1>
                <Card className="p-8 space-y-6"><Input label="Verkäufer Name" value={settings.userName} onChange={e=>actions.updateSettings({userName: e.target.value})} /><Input label="Signatur (z.B. LG Rico)" value={settings.signature} onChange={e=>actions.updateSettings({signature: e.target.value})} /></Card></div>
            );
        };

        // --- MAIN APP (Navigation Router) ---
        const MainApp = () => {
            const [view, setView] = useState('dashboard'); 
            const [isSidebarOpen, setSidebarOpen] = useState(false);

            const menu = {
                dashboard: { icon: 'fa-grip', label: 'Dashboard', component: <Dashboard setView={setView} /> },
                dealchecker: { icon: 'fa-bolt', label: 'Flohmarkt Radar', component: <DealChecker /> },
                analyze: { icon: 'fa-wand-magic-sparkles', label: 'Analyse Studio', component: <AnalyzeStudio /> },
                history: { icon: 'fa-box-archive', label: 'Inventar', component: <Inventory /> },
                sniper: { icon: 'fa-crosshairs', label: 'Sniper Radar', component: <Sniper /> },
                smartreply: { icon: 'fa-comment-dots', label: 'Smart Reply', component: <SmartReply /> },
                shipping: { icon: 'fa-route', label: 'Routenplaner', component: <ShippingRoutePlanner /> },
                profit: { icon: 'fa-chart-pie', label: 'Kassenbuch', component: <ProfitTracker /> },
                settings: { icon: 'fa-gear', label: 'Einstellungen', component: <Settings /> },
            };

            return (
                <div className="flex h-screen w-full overflow-hidden bg-transparent relative z-10">
                    <div className={`fixed inset-0 bg-gray-900/40 backdrop-blur-sm z-40 transition-opacity lg:hidden ${isSidebarOpen ? 'opacity-100' : 'opacity-0 pointer-events-none'}`} onClick={() => setSidebarOpen(false)}></div>
                    <aside className={`fixed lg:relative w-[280px] bg-white/95 backdrop-blur-xl shadow-[4px_0_24px_rgba(0,0,0,0.02)] h-full flex flex-col z-50 transition-transform duration-300 ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full lg:translate-x-0'}`}>
                        <div className="h-24 flex items-center px-8 shrink-0 border-b border-gray-100"><div className="w-10 h-10 bg-gradient-to-br from-vinted-500 to-vinted-700 rounded-xl flex items-center justify-center text-white mr-4 shadow-lg shadow-vinted-500/30"><i className="fa-solid fa-shirt"></i></div><span className="text-2xl font-extrabold tracking-tight">Vinted<span className="text-vinted-600">Pro</span></span></div>
                        <nav className="flex-1 py-6 px-4 space-y-2 overflow-y-auto no-scrollbar">
                            {Object.entries(menu).map(([id, item]) => (
                                <button key={id} onClick={() => { setView(id); setSidebarOpen(false); }} className={`w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl transition-all font-bold text-sm ${view === id ? 'bg-gray-900 text-white shadow-md' : 'text-gray-500 hover:bg-gray-100 hover:text-gray-900'}`}><i className={`fa-solid ${item.icon} w-6 text-lg ${view === id ? 'text-vinted-400' : ''}`}></i>{item.label}</button>
                            ))}
                        </nav>
                    </aside>
                    <main className="flex-1 flex flex-col min-w-0 h-full relative z-0">
                        <header className="h-16 bg-white/80 backdrop-blur-md border-b border-gray-200/50 flex items-center px-4 shrink-0 lg:hidden z-20"><button onClick={() => setSidebarOpen(true)} className="w-10 h-10 flex items-center justify-center rounded-xl hover:bg-gray-100 text-gray-700"><i className="fa-solid fa-bars text-xl"></i></button><span className="font-extrabold ml-3 text-lg">{menu[view]?.label}</span></header>
                        <div className="flex-1 relative z-10 overflow-hidden">{menu[view]?.component}</div>
                    </main>
                </div>
            );
        };

        const RootApp = () => <ErrorBoundary><AppProvider><MainApp /></AppProvider></ErrorBoundary>;
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<RootApp />);
    </script>
</body>
</html>
