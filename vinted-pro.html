                                        <input type="file" multiple accept="image/*" onChange={(e) => setFiles(prev => [...prev, ...Array.from(e.target.files)])} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" />
                                        <i className="fa-solid fa-camera-retro text-3xl text-gray-400 mb-3"></i>
                                        <p className="text-sm text-gray-600 font-bold">Bilder vom Deal ablegen</p>
                                    </div>
                                    {files.length > 0 && (
                                        <div className="mt-4 flex gap-4 overflow-x-auto no-scrollbar pb-2">
                                            {files.map((f, i) => (
                                                <div key={i} className="w-16 h-16 rounded-xl overflow-hidden shrink-0 relative border border-gray-200 shadow-sm">
                                                    <img src={URL.createObjectURL(f)} className="w-full h-full object-cover" />
                                                    <button onClick={()=>setFiles(files.filter((_, idx)=>idx!==i))} className="absolute top-1 right-1 bg-white/90 backdrop-blur-sm rounded p-1 shadow-sm text-red-500 hover:bg-red-500 hover:text-white transition-colors"><i className="fa-solid fa-xmark text-[10px]"></i></button>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </Card>

                            <Card className="p-8">
                                <h2 className="text-xl font-extrabold text-gray-900 mb-6 border-b border-gray-100 pb-4 flex items-center gap-3"><div className="w-8 h-8 rounded-lg bg-amber-100 text-amber-600 flex items-center justify-center"><i className="fa-solid fa-calculator"></i></div> 2. Kalkulation</h2>
                                <div className="flex items-center gap-3 mb-6 p-4 bg-vinted-50/50 rounded-2xl border border-vinted-100 cursor-pointer hover:bg-vinted-50 transition-colors shadow-inner-light" onClick={()=>setIsFree(!isFree)}>
                                    <div className={`w-6 h-6 rounded-md border-2 flex items-center justify-center transition-colors ${isFree ? 'bg-vinted-600 border-vinted-600 text-white' : 'border-gray-300 bg-white'}`}>
                                        {isFree && <i className="fa-solid fa-check text-xs"></i>}
                                    </div>
                                    <span className="text-base font-bold text-vinted-900">Artikel ist Zu verschenken (0 €)</span>
                                </div>
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-8 mb-8">
                                    <Input label="Geforderter Preis (€)" type="number" placeholder="z.B. 15" value={purchasePrice} onChange={e=>setPurchasePrice(e.target.value)} disabled={isFree} icon="fa-money-bill-wave" />
                                    <div>
                                        <label className="text-[11px] font-extrabold text-gray-500 uppercase tracking-widest pl-1 mb-2 block">Ziel-Marge (Netto)</label>
                                        <div className="bg-white border border-gray-200 rounded-2xl p-3.5 flex items-center justify-between shadow-inner-light">
                                            <input type="range" min="10" max="100" step="5" value={margin} onChange={e=>setMargin(Number(e.target.value))} className="w-2/3" />
                                            <span className="font-bold text-vinted-600 text-base">{margin}%</span>
                                        </div>
                                    </div>
                                </div>
                                <Button onClick={handleCheck} loading={loading} variant="primary" className="w-full" size="lg" icon="fa-magnifying-glass-chart">Deal analysieren</Button>
                            </Card>
                        </div>

                        <div className="min-h-[600px] animate-slide-up" style={{animationDelay: '200ms'}}>
                            {loading && (
                                <Card className="h-full p-12 flex flex-col items-center justify-center text-center">
                                    <div className="w-24 h-24 bg-gray-50 rounded-full border border-gray-100 shadow-inner-light flex items-center justify-center mb-8 relative">
                                        <div className="absolute inset-0 border-4 border-vinted-500 rounded-full border-t-transparent animate-spin"></div>
                                        <i className="fa-solid fa-brain text-4xl text-vinted-600 animate-pulse-fast"></i>
                                    </div>
                                    <p className="font-extrabold text-gray-900 mb-3 text-2xl">Analysiere Angebotsebene...</p>
                                    <p className="text-sm text-gray-500 font-medium text-lg max-w-sm mx-auto leading-relaxed">Die KI prüft Marktnachfrage, vergleicht Preise und checkt das Risiko für diesen Artikel.</p>
                                </Card>
                            )}
                            
                            {result && !loading && (
                                <Card className={`h-full flex flex-col relative overflow-hidden border-t-8 shadow-floating animate-slide-in-right ${result.worth_it ? 'border-t-green-500' : 'border-t-red-500'}`}>
                                    <div className="p-8 md:p-10 flex-1 overflow-y-auto no-scrollbar">
                                        <div className="flex flex-col sm:flex-row justify-between items-start gap-6 mb-8">
                                            <div>
                                                <h2 className={`text-4xl md:text-5xl font-black mb-3 tracking-tight ${result.worth_it ? 'text-green-600' : 'text-red-600'}`}>{result.worth_it ? 'Zuschlagen! 👍' : 'Finger weg! 🛑'}</h2>
                                                <p className="text-gray-900 font-bold text-lg bg-gray-100 inline-block px-4 py-1.5 rounded-lg border border-gray-200">{result.item_name}</p>
                                            </div>
                                            <div className="flex flex-col gap-3 shrink-0 text-right">
                                                <Badge color={result.risk_assessment==='Hoch'?'red':result.risk_assessment==='Mittel'?'amber':'green'} className="justify-center py-2 px-4 shadow-sm text-sm">Risiko: {result.risk_assessment}</Badge>
                                                <Badge color={result.demand_level==='Hoch'?'green':result.demand_level==='Mittel'?'blue':'gray'} className="justify-center py-2 px-4 shadow-sm text-sm">Nachfrage: {result.demand_level}</Badge>
                                            </div>
                                        </div>
                                        
                                        <div className="grid grid-cols-2 md:grid-cols-3 gap-4 mb-10">
                                            <div className="bg-gray-50 p-5 rounded-2xl border border-gray-200 shadow-inner-light">
                                                <p className="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-2">Est. Vinted Wert</p>
                                                <p className="text-3xl font-black text-gray-900">{parsePrice(result.estimated_sell_price).toFixed(2)} €</p>
                                            </div>
                                            <div className="bg-gray-50 p-5 rounded-2xl border border-gray-200 shadow-inner-light">
                                                <p className="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-2">Max. Ankauf</p>
                                                <p className="text-3xl font-black text-gray-900">{result.max_buy_price} {result.max_buy_price !== '0' && result.max_buy_price !== 'Kostenlos!' && '€'}</p>
                                            </div>
                                            <div className={`${result.worth_it ? 'bg-green-50 border-green-200 text-green-800' : 'bg-red-50 border-red-200 text-red-800'} p-5 rounded-2xl border col-span-2 md:col-span-1 shadow-sm`}>
                                                <p className="text-[10px] font-bold uppercase tracking-widest mb-2">Netto-Gewinn</p>
                                                <div className="flex items-center gap-3">
                                                    <p className="text-3xl font-black">{parsePrice(result.calculated_profit).toFixed(2)} €</p>
                                                    <span className={`text-xs font-bold px-2 py-1 rounded bg-white shadow-sm ${result.worth_it ? 'text-green-600' : 'text-red-600'}`}>ROI: {result.roi_percent}%</span>
                                                </div>
                                            </div>
                                        </div>

                                        <div className="space-y-8">
                                            <div>
                                                <h3 className="text-sm font-bold text-gray-900 mb-3 flex items-center gap-2"><i className="fa-solid fa-chart-line text-vinted-500"></i> Marktanalyse</h3>
                                                <p className="text-base text-gray-700 font-medium leading-relaxed bg-gray-50/80 p-5 rounded-2xl border border-gray-200 shadow-inner-light">{result.deep_analysis}</p>
                                            </div>
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                                <div className="bg-blue-50/80 p-6 rounded-2xl border border-blue-200 shadow-sm">
                                                    <h3 className="text-xs font-bold text-blue-800 uppercase tracking-widest mb-4 flex items-center gap-2"><i className="fa-solid fa-list-check"></i> Action Plan</h3>
                                                    <ul className="space-y-3">
                                                        {Array.isArray(result.action_steps) ? result.action_steps.map((s,i) => <li key={i} className="text-sm text-blue-900 font-medium flex gap-3"><span className="w-6 h-6 rounded-full bg-blue-200 text-blue-700 flex items-center justify-center text-xs font-bold shrink-0">{i+1}</span> {s}</li>) : <li className="text-sm text-blue-900">{result.action_steps}</li>}
                                                    </ul>
                                                </div>
                                                <div className="bg-red-50/80 p-6 rounded-2xl border border-red-200 shadow-sm">
                                                    <h3 className="text-xs font-bold text-red-800 uppercase tracking-widest mb-4 flex items-center gap-2"><i className="fa-solid fa-flag"></i> Red Flags</h3>
                                                    <ul className="space-y-3">
                                                        {Array.isArray(result.red_flags) ? result.red_flags.map((f,i) => <li key={i} className="text-sm text-red-900 font-medium flex gap-3"><i className="fa-solid fa-triangle-exclamation mt-1 text-red-500"></i> {f}</li>) : <li className="text-sm text-red-900">{result.red_flags}</li>}
                                                    </ul>
                                                </div>
                                            </div>
                                            <div className="pt-6 border-t border-gray-100">
                                                <div className="flex justify-between items-center mb-4">
                                                    <h3 className="text-sm font-bold text-gray-900 flex items-center gap-2"><i className="fa-solid fa-comment-dots text-vinted-500"></i> Anschreiben (Copy & Paste)</h3>
                                                    <Button variant="ghost" size="sm" onClick={()=>{navigator.clipboard.writeText(result.negotiation_msg); addToast('Kopiert');}} icon="fa-copy">Kopieren</Button>
                                                </div>
                                                <div className="bg-white border-2 border-gray-100 p-6 rounded-2xl text-base font-medium text-gray-800 whitespace-pre-wrap shadow-inner-light">{result.negotiation_msg}</div>
                                            </div>
                                        </div>
                                    </div>
                                </Card>
                            )}
                            {!result && !loading && (
                                <div className="h-full flex flex-col items-center justify-center text-center p-12 bg-white/50 rounded-3xl border border-dashed border-gray-300">
                                    <div className="w-24 h-24 bg-white rounded-full flex items-center justify-center text-gray-300 text-5xl mb-6 shadow-sm border border-gray-100"><i className="fa-solid fa-scale-balanced"></i></div>
                                    <p className="text-gray-500 font-semibold max-w-sm leading-relaxed">Die KI zerlegt jedes Angebot für dich. Lade Screenshots hoch, kalkuliere deine Marge und vermeide schlechte Deals.</p>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // --- SNIPER ---
        const Sniper = () => {
            const { alerts, actions, addToast } = useAppContext();
            const [brand, setBrand] = useState("");

            const addAlert = () => {
                if(!brand.trim()) return addToast("Bitte Suchbegriff eingeben", "warning");
                actions.addAlert({ brand: brand.trim() });
                setBrand("");
                addToast("Suchauftrag angelegt!", "success");
            };

            const openVinted = (query) => {
                if(!query) return;
                window.open(`https://www.vinted.de/vetements?search_text=${encodeURIComponent(query)}&order=newest_first`, '_blank');
            };

            const openKleinanzeigen = (query) => {
                if(!query) return;
                window.open(`https://www.kleinanzeigen.de/s-sortierung:erstellungsdatum/${encodeURIComponent(query).replace(/%20/g, '-')}/k0`, '_blank');
            };

            return (
                <div className="p-6 lg:p-12 max-w-5xl mx-auto h-full overflow-y-auto animate-fade-in pb-32">
                    <div className="mb-10 animate-slide-in-right">
                        <div className="flex items-center gap-4 mb-3">
                            <h1 className="text-4xl md:text-5xl font-extrabold text-gray-900 tracking-tight">Market Sniper</h1>
                            <span className="bg-red-100 text-red-700 text-xs font-bold px-3 py-1.5 rounded-lg animate-pulse shadow-sm">LIVE LINKS</span>
                        </div>
                        <p className="text-gray-500 font-medium text-lg">Hinterlege Suchbegriffe. Ein Klick öffnet Vinted/Ebay – exakt gefiltert nach "Neueste zuerst". So bist du immer der Erste.</p>
                    </div>

                    <Card className="p-8 bg-gray-900 text-white mb-10 border-gray-800 shadow-floating animate-slide-up">
                        <h2 className="text-xl font-bold text-white mb-6 flex items-center gap-3"><i className="fa-solid fa-crosshairs text-red-500"></i> Neuen Radar Alert anlegen</h2>
                        <div className="flex flex-col sm:flex-row gap-4">
                            <input type="text" value={brand} onChange={e=>setBrand(e.target.value)} placeholder="z.B. Carhartt Detroit Jacket" className="flex-1 bg-gray-800/50 backdrop-blur-sm border border-gray-700 rounded-2xl p-4 text-white placeholder-gray-500 focus:border-red-500 focus:ring-4 focus:ring-red-500/20 outline-none text-base font-medium transition-all" />
                            <Button variant="primary" onClick={addAlert} size="lg" className="!bg-red-600 hover:!bg-red-700 !border-red-500 shadow-lg shadow-red-500/20" icon="fa-plus">Alert Speichern</Button>
                        </div>
                    </Card>

                    <div className="space-y-5">
                        <h3 className="font-extrabold text-gray-900 text-xl mb-6">Deine aktiven Snipes</h3>
                        {alerts.map((a, i) => {
                            if(!a) return null;
                            return (
                                <Card key={a.id || i} className="p-6 flex flex-col sm:flex-row justify-between items-center gap-6 group animate-slide-up" style={{animationDelay: `${i*100}ms`}}>
                                    <div className="flex items-center gap-4 w-full sm:w-auto min-w-0">
                                        <div className="w-4 h-4 rounded-full bg-red-500 animate-pulse shrink-0 shadow-[0_0_10px_rgba(239,68,68,0.6)]"></div>
                                        <p className="font-black text-xl text-gray-900 truncate">{a.brand}</p>
                                    </div>
                                    <div className="flex gap-3 w-full sm:w-auto shrink-0">
                                        <Button onClick={()=>openVinted(a.brand)} className="flex-1 sm:flex-none !bg-vinted-50 hover:!bg-vinted-100 !text-vinted-700 !border-vinted-200" icon="fa-shirt">Vinted</Button>
                                        <Button onClick={()=>openKleinanzeigen(a.brand)} className="flex-1 sm:flex-none !bg-green-50 hover:!bg-green-100 !text-green-700 !border-green-200" icon="fa-tag">Ebay</Button>
                                        <Button onClick={()=>actions.deleteAlert(a.id)} className="!bg-gray-50 hover:!bg-red-50 !text-gray-400 hover:!text-red-500 !border-gray-200 hover:!border-red-200" icon="fa-trash"></Button>
                                    </div>
                                </Card>
                            )
                        })}
                        {alerts.length === 0 && <EmptyState icon="fa-radar" title="Radar inaktiv" description="Lege Suchbegriffe an, um den Markt zu überwachen und als erster zuzuschlagen." />}
                    </div>
                </div>
            );
        };

        // --- SHIPPING ROUTE ---
        const ShippingRoutePlanner = () => {
            const { routeStops, actions, addToast } = useAppContext();
            const [startLoc, setStartLoc] = useState("");
            const [endLoc, setEndLoc] = useState("");

            const addStop = (carrier) => {
                actions.addRouteStop(carrier);
                addToast(`${carrier} Halt hinzugefügt`, "success");
            };

            const openRoute = () => {
                if(!startLoc.trim()) return addToast("Bitte Startpunkt eingeben", "warning");
                if((routeStops||[]).length === 0) return addToast("Bitte füge Paketshops hinzu", "warning");

                const origin = encodeURIComponent(startLoc);
                const destination = endLoc.trim() ? encodeURIComponent(endLoc) : origin;
                
                const waypointsList = (routeStops||[]).filter(s=>s && s.carrier).map(s => encodeURIComponent(`${s.carrier} Paketshop`));
                const waypointsStr = waypointsList.join('|');
                
                window.open(`https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${destination}&waypoints=${waypointsStr}`, '_blank');
                addToast("Google Maps wird geöffnet...", "success");
            };

            return (
                <div className="p-6 lg:p-12 max-w-[1400px] mx-auto h-full flex flex-col animate-fade-in pb-32 overflow-y-auto">
                    <datalist id="orte-vorschlaege">
                        <option value="Winsen (Luhe)" /><option value="Winsen (Luhe) Bahnhof" /><option value="Lüneburg" /><option value="Hamburg" /><option value="Stelle" /><option value="Ashausen" /><option value="Pattensen" />
                    </datalist>

                    <div className="mb-10 animate-slide-in-right">
                        <h1 className="text-4xl md:text-5xl font-extrabold text-gray-900 tracking-tight">Smart Routenplaner</h1>
                        <p className="text-gray-500 mt-2 font-medium text-lg">Plane deine Fahrt, notiere Pakete und lass Google den besten Weg finden.</p>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 flex-1">
                        <div className="space-y-8 flex flex-col h-full animate-slide-up" style={{animationDelay: '100ms'}}>
                            <Card className="p-8">
                                <h2 className="text-xl font-extrabold text-gray-900 mb-6 border-b border-gray-100 pb-4 flex items-center gap-3"><div className="w-8 h-8 rounded-lg bg-vinted-100 text-vinted-600 flex items-center justify-center"><i className="fa-solid fa-map-pin"></i></div> 1. Wegpunkte</h2>
                                <div className="space-y-5">
                                    <div className="flex flex-col gap-1.5">
                                        <label className="text-[11px] font-extrabold text-gray-500 uppercase tracking-widest pl-1">Startpunkt (Dein Standort)</label>
                                        <div className="relative">
                                            <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400"><i className="fa-solid fa-location-dot"></i></div>
                                            <input type="text" list="orte-vorschlaege" value={startLoc} onChange={e=>setStartLoc(e.target.value)} placeholder="Straße, Ort..." className="block w-full rounded-2xl border border-gray-200 bg-white/70 text-gray-900 placeholder-gray-400 focus:bg-white focus:border-vinted-500 focus:ring-4 focus:ring-vinted-500/10 transition-all p-4 pl-12 sm:text-sm shadow-inner-light" />
                                        </div>
                                    </div>
                                    <div className="flex flex-col gap-1.5">
                                        <label className="text-[11px] font-extrabold text-gray-500 uppercase tracking-widest pl-1">Zielpunkt (Optional)</label>
                                        <div className="relative">
                                            <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400"><i className="fa-solid fa-flag-checkered"></i></div>
                                            <input type="text" list="orte-vorschlaege" value={endLoc} onChange={e=>setEndLoc(e.target.value)} placeholder="Wenn abweichend vom Start..." className="block w-full rounded-2xl border border-gray-200 bg-white/70 text-gray-900 placeholder-gray-400 focus:bg-white focus:border-vinted-500 focus:ring-4 focus:ring-vinted-500/10 transition-all p-4 pl-12 sm:text-sm shadow-inner-light" />
                                        </div>
                                    </div>
                                </div>
                            </Card>

                            <Card className="p-8 flex-1 flex flex-col">
                                <h2 className="text-xl font-extrabold text-gray-900 mb-6 border-b border-gray-100 pb-4 flex items-center gap-3"><div className="w-8 h-8 rounded-lg bg-blue-100 text-blue-600 flex items-center justify-center"><i className="fa-solid fa-store"></i></div> 2. Shops hinzufügen</h2>
                                
                                <div className="flex flex-wrap gap-3 mb-8">
                                    {VINTED_DATA.carriers.map(c => (
                                        <button key={c} onClick={()=>addStop(c)} className="bg-white border-2 border-gray-200 hover:border-vinted-500 hover:bg-vinted-50 hover:text-vinted-700 px-5 py-2.5 rounded-xl text-sm font-bold text-gray-700 transition-all shadow-sm active:scale-95">
                                            <i className="fa-solid fa-plus mr-1"></i> {c}
                                        </button>
                                    ))}
                                </div>

                                <div className="flex-1 space-y-4 overflow-y-auto no-scrollbar pb-4 min-h-[250px]">
                                    {(routeStops||[]).map((stop, i) => {
                                        if(!stop) return null;
                                        return (
                                        <div key={stop.id||i} className="bg-white border-2 border-gray-100 rounded-2xl p-5 relative group hover:border-gray-200 transition-colors shadow-sm animate-slide-in-right">
                                            <button onClick={()=>actions.deleteRouteStop(stop.id)} className="absolute top-4 right-4 w-8 h-8 rounded-lg bg-gray-50 text-gray-400 hover:text-red-500 hover:bg-red-50 transition-colors"><i className="fa-solid fa-trash text-sm"></i></button>
                                            <div className="flex items-center gap-3 mb-4">
                                                <div className="w-8 h-8 rounded-full bg-vinted-50 text-vinted-600 flex items-center justify-center font-black text-sm">{i+1}</div>
                                                <h3 className="font-extrabold text-gray-900 text-lg">{stop.carrier} Shop</h3>
                                            </div>
                                            <textarea value={stop.notes} onChange={e => actions.updateRouteStop(stop.id, e.target.value)} placeholder={`Welche Pakete müssen hier hin?\nz.B. "Grauer Pulli an Max", "Sneaker an Anna"`} className="w-full bg-gray-50/80 border border-gray-200 rounded-xl p-4 text-sm resize-none outline-none focus:bg-white focus:border-vinted-500 focus:ring-4 focus:ring-vinted-500/10 transition-all font-medium text-gray-700 shadow-inner-light" rows="3"></textarea>
                                        </div>
                                    )})}
                                    {(routeStops||[]).length === 0 && (
                                        <EmptyState icon="fa-route" title="Keine Haltepunkte" description="Klicke oben auf einen Dienstleister, um ihn zur Route hinzuzufügen." />
                                    )}
                                </div>

                                <div className="pt-8 border-t border-gray-100 mt-auto flex gap-4">
                                    <Button variant="secondary" onClick={actions.clearRoute} disabled={(routeStops||[]).length===0} className="px-6" title="Liste leeren" size="lg"><i className="fa-solid fa-trash-can"></i></Button>
                                    <Button variant="vinted" onClick={openRoute} className="flex-1" size="lg" icon="fa-location-arrow">Maps Route starten</Button>
                                </div>
                            </Card>
                        </div>

                        <div className="animate-slide-up" style={{animationDelay: '200ms'}}>
                            <Card className="p-10 bg-gray-900 text-white relative overflow-hidden h-full min-h-[500px] flex flex-col justify-center border-gray-800 shadow-floating">
                                <i className="fa-solid fa-map-location-dot absolute -right-10 -bottom-10 text-[12rem] text-white/5 transform -rotate-12"></i>
                                <h2 className="text-4xl font-extrabold mb-6 relative z-10 tracking-tight">Stressfreier Versand.</h2>
                                <p className="text-gray-400 leading-relaxed text-base relative z-10 font-medium">
                                    Dieser Routenplaner ist dein Logistik-Zentrum.<br/><br/>
                                    <span className="text-vinted-400 font-bold block mb-3 text-lg">Dein Pro-Workflow:</span>
                                    <span className="block mb-2"><strong className="text-white">1.</strong> Packe alle deine Bestellungen.</span>
                                    <span className="block mb-2"><strong className="text-white">2.</strong> Füge für jeden Dienstleister (DHL, Hermes...) einen Halt hinzu.</span>
                                    <span className="block mb-2"><strong className="text-white">3.</strong> Notiere dir im Textfeld, welches Paket bei welchem Shop abgegeben werden muss. So vertauschst du nie wieder Label!</span>
                                    <span className="block"><strong className="text-white">4.</strong> Klicke auf Start. Google Maps baut dir automatisch die effizienteste Route.</span>
                                </p>
                            </Card>
                        </div>
                    </div>
                </div>
            );
        };

        // --- PROFIT TRACKER ---
        const ProfitTracker = () => {
            const { listings, actions } = useAppContext();
            const sold = (listings||[]).filter(l => l && l.status === 'sold');
            
            // 1000% Sichere Rechnungen
            const rev = sold.reduce((s, l) => s + parsePrice(l?.price), 0);
            const cost = sold.reduce((s, l) => s + parsePrice(l?.buy_price), 0);
            const profit = rev - cost;
            const margin = rev > 0 ? ((profit / rev) * 100).toFixed(1) : 0;

            return (
                <div className="p-6 lg:p-12 max-w-7xl mx-auto h-full overflow-y-auto animate-fade-in pb-32">
                    <div className="mb-10 animate-slide-in-right">
                        <h1 className="text-4xl font-extrabold text-gray-900 tracking-tight">Kassenbuch</h1>
                        <p className="text-gray-500 mt-2 font-medium text-lg">Detaillierte Finanzübersicht deiner Reselling-Aktivitäten.</p>
                    </div>

                    <div className="grid grid-cols-2 md:grid-cols-4 gap-6 mb-10">
                        <Card className="p-6 bg-white border border-gray-200 hover:-translate-y-1 transition-transform animate-slide-up" style={{animationDelay: '100ms'}}>
                            <p className="text-[11px] font-extrabold text-gray-500 uppercase tracking-widest mb-2">Umsatz</p>
                            <h3 className="text-3xl font-black text-gray-900">{rev.toFixed(2)} €</h3>
                        </Card>
                        <Card className="p-6 bg-white border border-gray-200 hover:-translate-y-1 transition-transform animate-slide-up" style={{animationDelay: '200ms'}}>
                            <p className="text-[11px] font-extrabold text-gray-500 uppercase tracking-widest mb-2">Ausgaben</p>
                            <h3 className="text-3xl font-black text-red-500">{cost.toFixed(2)} €</h3>
                        </Card>
                        <Card className="p-6 bg-white border border-gray-200 hover:-translate-y-1 transition-transform animate-slide-up" style={{animationDelay: '300ms'}}>
                            <p className="text-[11px] font-extrabold text-gray-500 uppercase tracking-widest mb-2">Marge</p>
                            <h3 className="text-3xl font-black text-vinted-600">{margin}%</h3>
                        </Card>
                        <Card className="p-6 bg-gray-900 text-white border border-gray-800 hover:-translate-y-1 transition-transform shadow-floating animate-slide-up" style={{animationDelay: '400ms'}}>
                            <p className="text-[11px] font-extrabold text-gray-400 uppercase tracking-widest mb-2">Netto-Gewinn</p>
                            <h3 className="text-3xl font-black text-white">{profit.toFixed(2)} €</h3>
                        </Card>
                    </div>

                    <Card noPadding className="animate-slide-up" style={{animationDelay: '500ms'}}>
                        <div className="overflow-x-auto no-scrollbar">
                            <table className="w-full text-left border-collapse">
                                <thead>
                                    <tr className="bg-white border-b border-gray-100 shadow-xs">
                                        <th className="px-8 py-5 text-[10px] font-extrabold text-gray-400 uppercase tracking-widest">Verkaufter Artikel</th>
                                        <th className="px-8 py-5 text-[10px] font-extrabold text-gray-400 uppercase tracking-widest">Umsatz</th>
                                        <th className="px-8 py-5 text-[10px] font-extrabold text-gray-400 uppercase tracking-widest w-48">Einkaufspreis</th>
                                        <th className="px-8 py-5 text-[10px] font-extrabold text-gray-400 uppercase tracking-widest text-right">Gewinn</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-gray-50">
                                    {sold.map((item, i) => {
                                        if(!item) return null;
                                        const p = parsePrice(item.price) - parsePrice(item.buy_price);
                                        return (
                                            <tr key={item.id||i} className="hover:bg-gray-50/80 transition-colors">
                                                <td className="px-8 py-5 font-bold text-sm text-gray-900">{item.title || 'Artikel'}</td>
                                                <td className="px-8 py-5 font-black text-sm text-gray-900">{parsePrice(item.price).toFixed(2)} €</td>
                                                <td className="px-8 py-5">
                                                    <div className="relative">
                                                        <span className="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 font-bold text-sm">€</span>
                                                        <input type="number" value={item.buy_price || ''} placeholder="0.00" onChange={e => actions.updateListing(item.id, { buy_price: e.target.value })} className="w-full pl-9 pr-3 py-2.5 text-sm font-bold border border-gray-200 rounded-xl outline-none focus:bg-white focus:border-vinted-500 focus:ring-4 focus:ring-vinted-500/10 shadow-inner-light transition-all bg-gray-50" />
                                                    </div>
                                                </td>
                                                <td className={`px-8 py-5 font-black text-base text-right ${p >= 0 ? 'text-green-600' : 'text-red-500'}`}>{p > 0 ? '+' : ''}{p.toFixed(2)} €</td>
                                            </tr>
                                        );
                                    })}
                                    {sold.length === 0 && <tr><td colSpan="4"><EmptyState icon="fa-coins" title="Kasse leer" description="Markiere Artikel im Inventar als 'Verkauft', damit sie hier auftauchen." /></td></tr>}
                                </tbody>
                            </table>
                        </div>
                    </Card>
                </div>
            );
        };

        // --- SMART REPLY ---
        const SmartReply = () => {
            const { addToast, settings } = useAppContext();
            const [price, setPrice] = useState("");
            const [date, setDate] = useState("morgen");
            const [lang, setLang] = useState("DE");

            const T = {
                DE: {
                    fav: `Moin! 👋\nFreut mich sehr, dass dir der Artikel gefällt. \nLass es mich gerne wissen, falls du noch weitere Infos oder Detailbilder brauchst, oder wenn wir über den Preis quatschen wollen.\n\n${settings?.signature || ''}`,
                    low: `Moin! 👋\nDanke für dein Angebot. Für den Preis möchte ich es aktuell leider noch nicht abgeben.\nMeine absolute Schmerzgrenze läge bei [PREIS] €. Wäre das für dich auch noch okay?\n\n${settings?.signature || ''}`,
                    bought: `Moin! 👋\nVielen Dank für deinen Kauf und das Vertrauen!\nDein Paket geht spätestens [DATUM] sicher verpackt auf die Reise. Ich melde mich kurz bei dir, sobald es bei der Post liegt.\n\n${settings?.signature || ''}`,
                    sent: `Moin! 👋\nGute Nachrichten: Dein Paket ist auf dem Weg! Die Sendungsnummer (falls versichert) ist im System hinterlegt.\nSag mir gerne kurz Bescheid, wenn es gut angekommen ist.\n\n${settings?.signature || ''}`
                },
                EN: {
                    fav: `Hi there! 👋\nSo glad you like the item. \nLet me know if you need any more details, pictures, or if you'd like to discuss the price.\n\n${settings?.signature || ''}`,
                    low: `Hi! 👋\nThanks for your offer. I can't let it go for that price right now.\nMy absolute limit would be [PREIS] €. Would that still work for you?\n\n${settings?.signature || ''}`,
                    bought: `Hi! 👋\nThank you so much for your purchase!\nYour package will be safely packed and shipped by [DATUM] at the latest. I'll let you know as soon as it's on the way.\n\n${settings?.signature || ''}`,
                    sent: `Hi! 👋\nGood news: Your package is on its way! The tracking number (if insured) is updated in the system.\nPlease let me know when it arrives safely.\n\n${settings?.signature || ''}`
                },
                FR: {
                    fav: `Salut ! 👋\nRavi que l'article te plaise. \nN'hésite pas si tu as besoin de plus d'infos, de photos, ou si tu veux discuter du prix.\n\n${settings?.signature || ''}`,
                    low: `Salut ! 👋\nMerci pour ton offre. À ce prix, je préfère le garder pour le moment.\nMon dernier prix serait de [PREIS] €. Est-ce que ça t'irait ?\n\n${settings?.signature || ''}`,
                    bought: `Salut ! 👋\nMerci beaucoup pour ton achat !\nTon colis sera bien emballé et expédié [DATUM] au plus tard. Je te préviens dès qu'il est en route.\n\n${settings?.signature || ''}`,
                    sent: `Salut ! 👋\nBonne nouvelle : ton colis est en route ! Le numéro de suivi est dans le système.\nDis-moi quand tu l'auras bien reçu.\n\n${settings?.signature || ''}`
                },
                NL: {
                    fav: `Hoi! 👋\nLeuk dat je het artikel mooi vindt. \nLaat het me weten als je meer info of foto's nodig hebt, of als je over de prijs wilt praten.\n\n${settings?.signature || ''}`,
                    low: `Hoi! 👋\nBedankt voor je bod. Voor die prijs wil ik het momenteel nog niet wegdoen.\nMijn absolute bodemprijs is [PREIS] €. Zou dat ook goed voor je zijn?\n\n${settings?.signature || ''}`,
                    bought: `Hoi! 👋\nHeel erg bedankt voor je aankoop!\nJe pakketje gaat uiterlijk [DATUM] veilig verpakt op de post. Ik stuur je een berichtje zodra het onderweg is.\n\n${settings?.signature || ''}`,
                    sent: `Hoi! 👋\nGoed nieuws: je pakket is onderweg! Het trackingnummer staat in het systeem.\nLaat je me even weten als het goed is aangekomen?\n\n${settings?.signature || ''}`
                }
            };

            const activeLang = T[lang];
            const templates = [
                { id: 'fav', icon: 'fa-heart text-red-500', bg: 'bg-red-50', title: 'Favorit / Interesse', text: activeLang.fav },
                { id: 'low', icon: 'fa-arrow-trend-down text-orange-500', bg: 'bg-orange-50', title: 'Gegenangebot', hasPrice: true, text: activeLang.low },
                { id: 'bought', icon: 'fa-bag-shopping text-vinted-500', bg: 'bg-vinted-50', title: 'Nach dem Kauf', hasDate: true, text: activeLang.bought },
                { id: 'sent', icon: 'fa-truck-fast text-blue-500', bg: 'bg-blue-50', title: 'Paket verschickt', text: activeLang.sent },
            ];

            return (
                <div className="p-6 lg:p-12 max-w-6xl mx-auto h-full overflow-y-auto animate-fade-in no-scrollbar pb-32">
                    <div className="mb-10 flex flex-col md:flex-row md:items-end justify-between gap-6">
                        <div>
                            <h1 className="text-4xl font-extrabold text-gray-900 tracking-tight">Smart Reply</h1>
                            <p className="text-gray-500 mt-1 font-medium text-lg">Instant Antworten in 4 Sprachen. Null Wartezeit.</p>
                        </div>
                        <Card noPadding className="flex flex-col sm:flex-row divide-y sm:divide-y-0 sm:divide-x divide-gray-100 shadow-sm border border-gray-200">
                            <div className="px-5 py-4 flex items-center gap-3 bg-white">
                                <i className="fa-solid fa-euro-sign text-gray-400 text-sm"></i>
                                <input type="number" placeholder="Preis (z.B. 15)" value={price} onChange={e=>setPrice(e.target.value)} className="outline-none font-bold text-sm w-20 text-gray-900 placeholder-gray-300" />
                            </div>
                            <div className="px-5 py-4 flex items-center gap-3 bg-white">
                                <i className="fa-regular fa-calendar text-gray-400 text-sm"></i>
                                <input type="text" placeholder="Tag (z.B. morgen)" value={date} onChange={e=>setDate(e.target.value)} className="outline-none font-bold text-sm w-28 text-gray-900 placeholder-gray-300" />
                            </div>
                            <div className="px-5 py-4 flex items-center gap-3 bg-gray-50 cursor-pointer relative hover:bg-gray-100 transition-colors">
                                <i className="fa-solid fa-globe text-vinted-500 text-sm"></i>
                                <select value={lang} onChange={e=>setLang(e.target.value)} className="appearance-none outline-none font-extrabold text-sm text-gray-900 cursor-pointer bg-transparent pr-4 w-28">
                                    <option value="DE">Deutsch</option><option value="EN">English</option><option value="FR">Français</option><option value="NL">Nederlands</option>
                                </select>
                                <i className="fa-solid fa-chevron-down absolute right-4 top-1/2 -translate-y-1/2 text-[10px] text-gray-400 pointer-events-none"></i>
                            </div>
                        </Card>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        {templates.map((tpl, i) => {
                            let text = tpl.text;
                            if(tpl.hasPrice) text = text.replace('[PREIS]', price || 'XX');
                            if(tpl.hasDate) text = text.replace('[DATUM]', date || 'schnellstmöglich');
                            return (
                                <Card key={tpl.id} noPadding className="flex flex-col border border-gray-200 group hover:shadow-card-hover transition-all duration-300 hover:-translate-y-1 animate-slide-up" style={{animationDelay: `${i*100}ms`}}>
                                    <div className="p-5 border-b border-gray-100 flex items-center gap-4 bg-white">
                                        <div className={`w-12 h-12 rounded-xl flex items-center justify-center shrink-0 shadow-inner-light border border-white ${tpl.bg}`}><i className={`fa-solid ${tpl.icon} text-xl`}></i></div>
                                        <h3 className="font-extrabold text-gray-900 text-lg">{tpl.title}</h3>
                                    </div>
                                    <div className="p-8 flex-1 bg-gray-50/50"><p className="whitespace-pre-wrap text-base text-gray-700 font-medium leading-relaxed">{text}</p></div>
                                    <div className="p-5 border-t border-gray-100 bg-white">
                                        <Button variant="secondary" onClick={() => {navigator.clipboard.writeText(text); addToast("Kopiert!");}} className="w-full shadow-none group-hover:bg-gray-900 group-hover:text-white transition-colors border-transparent group-hover:border-gray-900" size="lg" icon="fa-copy">Text Kopieren</Button>
                                    </div>
                                </Card>
                            )
                        })}
                    </div>
                </div>
            );
        };

        // --- SETTINGS (Mit Export / Import) ---
        const Settings = () => {
            const { settings, actions, addToast } = useAppContext();
            const [localData, setLocalData] = useState(settings || {});

            const save = () => { actions.updateSettings(localData); addToast("Einstellungen gespeichert"); };
            const triggerFileSelect = () => document.getElementById('importFile').click();

            const handleImport = (e) => {
                const file = e.target.files[0];
                if(!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const parsed = JSON.parse(e.target.result);
                        actions.importData(parsed);
                    } catch(err) {
                        addToast("Die Datei ist beschädigt oder ungültig.", "error");
                    }
                };
                reader.readAsText(file);
            };

            return (
                <div className="p-6 lg:p-12 max-w-4xl mx-auto h-full overflow-y-auto animate-fade-in pb-32">
                    <div className="mb-10 animate-slide-in-right">
                        <h1 className="text-4xl font-extrabold text-gray-900 tracking-tight">Einstellungen</h1>
                        <p className="text-gray-500 mt-2 font-medium text-lg">Personalisiere und sichere dein VintedPro System.</p>
                    </div>

                    <div className="space-y-8 animate-slide-up" style={{animationDelay: '100ms'}}>
                        <Card className="p-8 md:p-10 border-t-4 border-t-vinted-500 shadow-sm">
                            <h2 className="text-xl font-bold text-gray-900 mb-6 border-b border-gray-100 pb-4"><i className="fa-solid fa-hard-drive text-vinted-500 mr-2"></i> Data Management (Backup)</h2>
                            <p className="text-sm text-gray-500 mb-8 font-medium leading-relaxed">Da VintedPro alle Daten lokal in deinem Browser speichert, solltest du regelmäßig ein Backup erstellen. So kannst du deine Daten auf einen anderen PC übertragen oder vor Datenverlust schützen.</p>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div className="bg-gray-50 p-6 rounded-2xl border border-gray-200 shadow-inner-light">
                                    <h3 className="font-bold text-gray-900 mb-2">Daten Exportieren</h3>
                                    <p className="text-xs text-gray-500 mb-4">Lade Inventar, Snipes und Routen als .json herunter.</p>
                                    <Button onClick={actions.exportData} variant="primary" className="w-full" icon="fa-cloud-arrow-down">Backup erstellen</Button>
                                </div>
                                <div className="bg-gray-50 p-6 rounded-2xl border border-gray-200 shadow-inner-light">
                                    <h3 className="font-bold text-gray-900 mb-2">Daten Importieren</h3>
                                    <p className="text-xs text-gray-500 mb-4">Stelle das System aus einer alten .json Datei wieder her.</p>
                                    <input type="file" id="importFile" accept=".json" className="hidden" onChange={handleImport} />
                                    <Button onClick={triggerFileSelect} variant="secondary" className="w-full" icon="fa-cloud-arrow-up">Backup laden</Button>
                                </div>
                            </div>
                        </Card>

                        <Card className="p-8 md:p-10">
                            <h2 className="text-xl font-bold text-gray-900 mb-8 border-b border-gray-100 pb-4"><i className="fa-solid fa-user text-vinted-500 mr-2"></i> Profil & Texte</h2>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                <Input label="Dein Vorname" value={localData.userName || ''} onChange={e=>setLocalData({...localData, userName: e.target.value})} icon="fa-user" />
                                <Input label="Nachrichten-Signatur" value={localData.signature || ''} onChange={e=>setLocalData({...localData, signature: e.target.value})} icon="fa-pen-nib" />
                            </div>
                        </Card>
                        
                        <Card className="p-8 md:p-10">
                            <h2 className="text-xl font-bold text-gray-900 mb-8 border-b border-gray-100 pb-4"><i className="fa-solid fa-microchip text-vinted-500 mr-2"></i> System (API)</h2>
                            <div className="mb-6">
                                <Input label="Google Gemini API Key" type="password" value={API_KEY} readOnly icon="fa-key" className="opacity-70 pointer-events-none" disabled />
                            </div>
                            <Select label="KI Modell (Priorität)" value={localData.apiModel || 'gemini-1.5-flash'} onChange={e=>setLocalData({...localData, apiModel: e.target.value})} options={['gemini-1.5-flash', 'gemini-flash-latest', 'gemini-1.5-pro']} icon="fa-server" />
                            <div className="bg-blue-50/80 p-5 rounded-2xl border border-blue-100 flex gap-4 items-start mt-6 shadow-sm">
                                <i className="fa-solid fa-shield-halved text-blue-600 mt-0.5 text-lg"></i>
                                <p className="text-sm text-blue-900 leading-relaxed font-medium">Dein System testet automatisch Fallback-Modelle mit Exponential Backoff (Schutz vor API-Limits und Abstürzen).</p>
                            </div>
                        </Card>
                        <div className="flex justify-end pt-4"><Button onClick={save} icon="fa-save" size="lg" className="px-10 shadow-lg">Einstellungen speichern</Button></div>
                    </div>
                </div>
            );
        };

        // ==========================================
        // 5. MAIN APP LAYOUT
        // ==========================================
        const MainApp = () => {
            const [view, setView] = useState('dashboard'); 
            const [isSidebarOpen, setSidebarOpen] = useState(false);
            const { settings } = useAppContext();

            const menu = [
                { id: 'dashboard', icon: 'fa-grip', label: 'Dashboard', component: <Dashboard setView={setView} /> },
                { id: 'analyze', icon: 'fa-wand-magic-sparkles', label: 'Analyse Studio', component: <AnalyzeStudio /> },
                { id: 'history', icon: 'fa-box-archive', label: 'Inventar', component: <Inventory setView={setView} /> },
                { id: 'dealchecker', icon: 'fa-scale-balanced', label: 'Deal Checker Pro', component: <DealChecker /> },
                { id: 'sniper', icon: 'fa-crosshairs', label: 'Sniper & Trends', component: <Sniper /> },
                { id: 'smartreply', icon: 'fa-comment-dots', label: 'Smart Reply', component: <SmartReply /> },
                { id: 'shipping', icon: 'fa-route', label: 'Routenplaner', component: <ShippingRoutePlanner /> },
                { id: 'profit', icon: 'fa-chart-pie', label: 'Profit Tracker', component: <ProfitTracker /> },
                { id: 'settings', icon: 'fa-gear', label: 'Einstellungen', component: <Settings /> },
            ];

            const activeMenu = menu.find(m => m.id === view);

            return (
                <div className="flex h-screen w-full overflow-hidden bg-transparent relative z-10">
                    <div className={`fixed inset-0 bg-gray-900/40 backdrop-blur-sm z-40 transition-opacity duration-400 lg:hidden ${isSidebarOpen ? 'opacity-100' : 'opacity-0 pointer-events-none'}`} onClick={() => setSidebarOpen(false)}></div>

                    <aside className={`fixed lg:relative w-[280px] bg-white/80 backdrop-blur-2xl border-r border-white/50 h-full flex flex-col z-50 transition-transform duration-500 ease-[cubic-bezier(0.16,1,0.3,1)] ${isSidebarOpen ? 'translate-x-0 shadow-[20px_0_50px_rgba(0,0,0,0.1)]' : '-translate-x-full lg:translate-x-0 lg:shadow-none'}`}>
                        <div className="h-24 flex items-center px-8 border-b border-gray-200/50 shrink-0 bg-white relative z-10">
                            <div className="w-10 h-10 bg-gray-900 rounded-xl flex items-center justify-center text-white shadow-md mr-4">
                                <i className="fa-solid fa-shirt text-base"></i>
                            </div>
                            <span className="text-2xl font-extrabold text-gray-900 tracking-tight">Vinted<span className="text-vinted-600">Pro</span></span>
                        </div>

                        <nav className="flex-1 py-8 px-4 space-y-1.5 overflow-y-auto no-scrollbar relative z-0">
                            <div className="px-4 mb-3 text-[10px] font-extrabold text-gray-400 uppercase tracking-widest">Main Menu</div>
                            {menu.slice(0, 3).map(item => (
                                <button key={item.id} onClick={() => { setView(item.id); setSidebarOpen(false); }}
                                    className={`w-full flex items-center gap-4 px-4 py-3 rounded-2xl transition-all duration-200 font-bold text-sm group ${view === item.id ? 'bg-white text-vinted-600 shadow-sm border border-gray-100' : 'text-gray-500 hover:bg-white/50 hover:text-gray-900 border border-transparent'}`}>
                                    <i className={`fa-solid ${item.icon} w-6 text-center text-lg ${view === item.id ? 'text-vinted-600' : 'text-gray-400 group-hover:scale-110 transition-transform'}`}></i>
                                    {item.label}
                                </button>
                            ))}
                            
                            <div className="px-4 mt-8 mb-3 text-[10px] font-extrabold text-gray-400 uppercase tracking-widest">Business Tools</div>
                            {menu.slice(3).map(item => (
                                <button key={item.id} onClick={() => { setView(item.id); setSidebarOpen(false); }}
                                    className={`w-full flex items-center gap-4 px-4 py-3 rounded-2xl transition-all duration-200 font-bold text-sm group ${view === item.id ? 'bg-white text-vinted-600 shadow-sm border border-gray-100' : 'text-gray-500 hover:bg-white/50 hover:text-gray-900 border border-transparent'}`}>
                                    <i className={`fa-solid ${item.icon} w-6 text-center text-lg ${view === item.id ? 'text-vinted-600' : 'text-gray-400 group-hover:scale-110 transition-transform'}`}></i>
                                    {item.label}
                                </button>
                            ))}
                        </nav>
                        
                        <div className="p-6 border-t border-gray-200/50">
                            <div className="flex items-center gap-4 bg-white/60 p-3 rounded-2xl border border-white shadow-sm cursor-pointer hover:bg-white transition-colors group" onClick={()=>setView('settings')}>
                                <img src={`https://ui-avatars.com/api/?name=${settings?.userName || 'Rico'}&background=f3e8ff&color=9333ea&bold=true`} className="w-10 h-10 rounded-xl shadow-sm group-hover:scale-105 transition-transform" />
                                <div className="flex-1 min-w-0">
                                    <p className="text-sm font-extrabold text-gray-900 truncate">{settings?.userName || 'Rico'}</p>
                                    <p className="text-[10px] font-bold text-green-500 flex items-center gap-1.5"><i className="fa-solid fa-circle text-[6px] animate-pulse"></i> Pro Account</p>
                                </div>
                            </div>
                        </div>
                    </aside>

                    <main className="flex-1 flex flex-col min-w-0 h-full relative z-0">
                        <header className="h-16 bg-white/80 backdrop-blur-md border-b border-gray-200/50 flex items-center justify-between px-4 shrink-0 lg:hidden z-20 shadow-sm">
                            <button onClick={() => setSidebarOpen(true)} className="text-gray-600 w-10 h-10 flex items-center justify-center rounded-xl hover:bg-gray-100 transition-colors"><i className="fa-solid fa-bars text-lg"></i></button>
                            <span className="font-bold text-gray-900 text-sm">{activeMenu?.label}</span>
                            <div className="w-10"></div>
                        </header>

                        <div className="flex-1 relative z-10 overflow-hidden">
                            {activeMenu ? activeMenu.component : <Dashboard setView={setView} />}
                        </div>
                    </main>
                </div>
            );
        };

        const RootApp = () => (
            <ErrorBoundary>
                <AppProvider>
                    <MainApp />
                </AppProvider>
            </ErrorBoundary>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<RootApp />);
    </script>
</body>
</html>
